# Продакшн-конфигурация: Traefik v3 reverse-proxy + java-bot + worker + redis.
#
# Переменные окружения берутся из .env файла на сервере.
# CI создаёт .env из GitHub Secrets перед каждым деплоем.
#
# Команда деплоя:
#   docker compose -f docker-compose.prod.yml --env-file .env pull
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans
#
# Проверка сертификата:
#   curl -I https://${TRAEFIK_DASHBOARD_DOMAIN}/dashboard/login
#
# ВАЖНО: перед первым деплоем создать общую сеть вручную:
#   docker network create traefik-proxy

services:
  # ===========================================================================
  # Docker Socket Proxy — изолирует docker.sock от Traefik.
  # Без этого Traefik c прямым доступом к /var/run/docker.sock = root-equiv:
  # любой RCE в Traefik → docker exec в любой контейнер на хосте → root.
  # Proxy экспонирует ТОЛЬКО endpoints необходимые для service discovery:
  # CONTAINERS, NETWORKS, SERVICES. Всё остальное (exec, start, stop, build) — 403.
  # ===========================================================================
  socket-proxy:
    # Pin SHA (а не только tag) защищает от подмены образа: даже если кто-то
    # перетянет тег 0.3.0 на новый layer с backdoor — Docker откажется его пулить.
    image: tecnativa/docker-socket-proxy:0.3.0@sha256:2f92c6e85a1199b3403c99d7439695898a162c69689b11130450ffadb352f0a0
    container_name: telegram-cleaner-socket-proxy
    labels:
      - "project=telegram-cleaner"
    environment:
      # Read-only API surface для Traefik. Любая попытка modify → 403.
      - CONTAINERS=1
      - NETWORKS=1
      - SERVICES=1
      - TASKS=1
      # Явный deny — defense in depth. Дефолты у proxy уже 0, но pin'им явно
      # на случай если upstream image сменит дефолты.
      - POST=0
      - BUILD=0
      - COMMIT=0
      - CONFIGS=0
      - EXEC=0
      - IMAGES=0
      - SECRETS=0
      - SWARM=0
      - SYSTEM=0
      - VOLUMES=0
    volumes:
      # Только сам proxy касается реального socket — read-only.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker-proxy
    restart: unless-stopped
    # ВНИМАНИЕ: НЕ ДОБАВЛЯТЬ read_only:true + tmpfs.
    # Образ tecnativa/docker-socket-proxy на старте делает sed по
    # /usr/local/etc/haproxy/haproxy.cfg.template и пишет .cfg в ту же папку.
    # read_only:true блокирует запись → crash loop. tmpfs:/usr/local/etc/haproxy
    # перекрывает шаблон из образа → `sed: ...template: No such file` → тоже crash.
    # Каскад: socket-proxy crash → Traefik без docker provider → нет routes →
    # 404 на ВСЁМ трафике. Health check (docker exec wget localhost:8080) этого
    # не ловит — обходит Traefik. Деф-ин-депт даёт API-фильтры + docker-proxy сеть.
    # История: коммиты 288a141 (ввёл read_only), 861ac37 (псевдо-фикс tmpfs), d6e4ef4 (откат).
    mem_limit: 32m
    cpus: '0.05'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ===========================================================================
  # Traefik v3: reverse-proxy + TLS (Let's Encrypt HTTP-01)
  # Слушает :80 (→ редирект на 443) и :443.
  # /api/** наружу НЕ публикуется — только /dashboard/** через Dashboard-router.
  # File provider (/config) позволяет добавлять маршруты без изменения этого файла.
  # ===========================================================================
  traefik:
    image: traefik:v3.0
    container_name: telegram-cleaner-traefik
    labels:
      - "project=telegram-cleaner"
    command:
      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # HTTP → HTTPS глобальный редирект
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Docker provider — читает labels со ВСЕХ контейнеров сервера через
      # docker-socket-proxy (read-only API surface), а НЕ напрямую через
      # /var/run/docker.sock — иначе RCE в Traefik = root на хосте.
      - --providers.docker=true
      - --providers.docker.endpoint=tcp://socket-proxy:2375
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=traefik-proxy
      # File provider — локальный конфиг на сервере (не в репо!)
      # Используется для маршрутизации других сервисов на хосте
      - --providers.file.directory=/config
      - --providers.file.watch=true
      # ACME / Let's Encrypt (управляет SSL для всех доменов автоматически)
      - --certificatesresolvers.letsencrypt.acme.httpChallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpChallenge.entryPoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json
      # Dashboard отключён в проде
      - --api.dashboard=false
      - --log.level=INFO
      # Access log в файл — fail2ban читает его для бана брутфорса
      - --accesslog=true
      - --accesslog.filepath=/logs/access.log
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # docker.sock убран — Traefik ходит к API через socket-proxy:2375.
      - traefik_acme:/acme
      - ${TRAEFIK_DATA_PATH}/logs:/logs
      - ${TRAEFIK_DATA_PATH}/config:/config:ro
      - ${TRAEFIK_DATA_PATH}/auth:/auth:ro
    depends_on:
      - socket-proxy
    networks:
      - traefik-proxy
      - docker-proxy
    restart: unless-stopped
    mem_limit: 128m
    cpus: '0.1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Java Bot: Spring Boot + дашборд
  # Порт 8080 НЕ выставляется напрямую — только через Traefik.
  # ===========================================================================
  java-bot:
    image: ghcr.io/thesmithmode/telegram-export-cleaner:${IMAGE_TAG:?IMAGE_TAG обязателен — задайте SHA образа}
    container_name: telegram-export-java-bot
    labels:
      - "project=telegram-cleaner"
      # ── Traefik routing ──────────────────────────────────────────────────
      - "traefik.enable=true"
      # Dashboard router: только /dashboard/** — /api/** остаётся internal
      - "traefik.http.routers.dashboard.rule=Host(`${TRAEFIK_DASHBOARD_DOMAIN}`) && PathPrefix(`/dashboard`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.middlewares=sec-headers,dashboard-ratelimit"
      - "traefik.http.services.java-bot.loadbalancer.server.port=8080"
      # ── Security headers middleware ───────────────────────────────────────
      - "traefik.http.middlewares.sec-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.sec-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.sec-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.sec-headers.headers.customFrameOptionsValue=DENY"
      - "traefik.http.middlewares.sec-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.sec-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      # ── Rate-limit middleware (per-IP) ───────────────────────────────────
      # 20 req/s в среднем, burst 40. IP берётся из X-Forwarded-For
      # (depth=1, за Let's Encrypt HTTP-01 proxy нет, клиентский IP идёт напрямую
      # в Traefik → RemoteAddr). Превышение → 429 Too Many Requests.
      - "traefik.http.middlewares.dashboard-ratelimit.ratelimit.average=20"
      - "traefik.http.middlewares.dashboard-ratelimit.ratelimit.burst=40"
      - "traefik.http.middlewares.dashboard-ratelimit.ratelimit.period=1s"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_QUEUE_NAME=telegram_export
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME}
      # Внутренний API ключ — ApiKeyFilter fail-fast без него.
      - JAVA_API_KEY=${JAVA_API_KEY}
      # Dashboard SQLite
      - DASHBOARD_DB_PATH=${DASHBOARD_DB_PATH:-/data/stats/dashboard.db}
      # Dashboard auth (Telegram Login Widget)
      - DASHBOARD_ENABLE_BOOTSTRAP=${DASHBOARD_ENABLE_BOOTSTRAP:-false}
      - DASHBOARD_ADMIN_TG_ID=${DASHBOARD_ADMIN_TG_ID}
      # Redis Streams для ingestion статистики
      - STATS_STREAM_KEY=${STATS_STREAM_KEY:-stats:events}
      - STATS_STREAM_GROUP=${STATS_STREAM_GROUP:-dashboard-writer}
      - STATS_STREAM_CONSUMER=${STATS_STREAM_CONSUMER:-java-bot-1}
      - STATS_STREAM_MAXLEN=${STATS_STREAM_MAXLEN:-100000}
      - TRAEFIK_DASHBOARD_DOMAIN=${TRAEFIK_DASHBOARD_DOMAIN}
      # TON-адрес для секции "Поддержать" на /dashboard/about. Пусто → секция скрыта.
      - DONATE_TON=${DONATE_TON:-}
    volumes:
      - export-data:/data/export
      # Dashboard SQLite — host bind mount вне docker volumes, чтобы переживать
      # compose down / volume rm. Путь на хосте задаётся ${HOST_DATA_PATH} в .env,
      # директорию готовит админ (chown uid:gid соответствует user'у java-bot).
      - ${HOST_DATA_PATH:-/var/lib/telegram-cleaner}/dashboard:/data/stats
    networks:
      - traefik-proxy
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 3 -O- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 150s
    mem_limit: 768m
    cpus: '0.75'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Python Worker
  # ===========================================================================
  python-worker:
    image: ghcr.io/thesmithmode/telegram-export-python-worker:${IMAGE_TAG:?IMAGE_TAG обязателен — задайте SHA образа}
    container_name: telegram-export-worker
    labels:
      - "project=telegram-cleaner"
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_SESSION_STRING=${TELEGRAM_SESSION_STRING}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - JAVA_API_BASE_URL=http://java-bot:8080
      - JAVA_API_KEY=${JAVA_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_QUEUE_NAME=telegram_export
      - WORKER_NAME=export-worker-prod
      - MAX_WORKERS=1
      - JOB_TIMEOUT=1800
      - MAX_RETRIES=3
      - RETRY_BASE_DELAY=1.0
      - RETRY_MAX_DELAY=32.0
      - CACHE_DB_PATH=/data/cache/messages.db
      - CACHE_ENABLED=true
      - CACHE_MAX_DISK_GB=25
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      # Message cache SQLite — host bind mount вне docker volumes, чтобы переживать
      # compose down / volume rm. Путь на хосте задаётся ${HOST_DATA_PATH} в .env,
      # бэкапится cron'ом на хосте через ops/backup-cache.sh.
      - ${HOST_DATA_PATH:-/var/lib/telegram-cleaner}/cache:/data/cache
    depends_on:
      java-bot:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*main.py' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 768m
    cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Redis
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: telegram-export-redis
    labels:
      - "project=telegram-cleaner"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD обязателен}
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a ${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  # Общая сеть для Traefik — создаётся вручную один раз: docker network create traefik-proxy
  # Сервисы которые должны быть доступны снаружи подключаются к этой сети.
  traefik-proxy:
    external: true
  # internal: java-bot ↔ worker ↔ redis (только внутренний трафик)
  internal:
    name: telegram-cleaner_internal
  # docker-proxy: изолированная сеть только для Traefik ↔ socket-proxy.
  # Java-bot, worker и redis в эту сеть НЕ подключаются — у них нет нужды
  # видеть docker API, и блокирует lateral movement из app-контейнера к socket.
  docker-proxy:
    name: telegram-cleaner_docker-proxy
    internal: true

volumes:
  redis-data:
  export-data:
  traefik_acme:
  # cache-data и dashboard_data переведены на host bind mount (${HOST_DATA_PATH})
  # для стойкости к любым `compose down`/volume rm.
