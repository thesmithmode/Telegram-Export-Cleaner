# Продакшн-конфигурация: Traefik v3 reverse-proxy + java-bot + worker + redis.
#
# Переменные окружения берутся из .env файла на сервере.
# CI создаёт .env из GitHub Secrets перед каждым деплоем.
#
# Команда деплоя:
#   docker compose -f docker-compose.prod.yml --env-file .env pull
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans
#
# Проверка сертификата:
#   curl -I https://${TRAEFIK_DASHBOARD_DOMAIN}/dashboard/login
#
# ВАЖНО: перед первым деплоем создать общую сеть вручную:
#   docker network create traefik-proxy

services:
  # ===========================================================================
  # Traefik v3: reverse-proxy + TLS (Let's Encrypt HTTP-01)
  # Слушает :80 (→ редирект на 443) и :443.
  # /api/** наружу НЕ публикуется — только /dashboard/** через Dashboard-router.
  # File provider (/config) позволяет добавлять маршруты без изменения этого файла.
  # ===========================================================================
  traefik:
    image: traefik:v3.0
    container_name: telegram-cleaner-traefik
    labels:
      - "project=telegram-cleaner"
    command:
      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # HTTP → HTTPS глобальный редирект
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Docker provider — читает labels со ВСЕХ контейнеров сервера
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=traefik-proxy
      # File provider — локальный конфиг на сервере (не в репо!)
      # Используется для маршрутизации других сервисов на хосте
      - --providers.file.directory=/config
      - --providers.file.watch=true
      # ACME / Let's Encrypt (управляет SSL для всех доменов автоматически)
      - --certificatesresolvers.letsencrypt.acme.httpChallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpChallenge.entryPoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json
      # Dashboard отключён в проде
      - --api.dashboard=false
      - --log.level=INFO
      # Access log в файл — fail2ban читает его для бана брутфорса
      - --accesslog=true
      - --accesslog.filepath=/logs/access.log
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/acme
      - ${TRAEFIK_DATA_PATH}/logs:/logs
      - ${TRAEFIK_DATA_PATH}/config:/config:ro
      - ${TRAEFIK_DATA_PATH}/auth:/auth:ro
    networks:
      - traefik-proxy
    restart: unless-stopped
    mem_limit: 128m
    cpus: '0.1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Java Bot: Spring Boot + дашборд
  # Порт 8080 НЕ выставляется напрямую — только через Traefik.
  # ===========================================================================
  java-bot:
    image: ghcr.io/thesmithmode/telegram-export-cleaner:latest
    container_name: telegram-export-java-bot
    labels:
      - "project=telegram-cleaner"
      # ── Traefik routing ──────────────────────────────────────────────────
      - "traefik.enable=true"
      # Dashboard router: только /dashboard/** — /api/** остаётся internal
      - "traefik.http.routers.dashboard.rule=Host(`${TRAEFIK_DASHBOARD_DOMAIN}`) && PathPrefix(`/dashboard`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.middlewares=sec-headers"
      - "traefik.http.services.java-bot.loadbalancer.server.port=8080"
      # ── Security headers middleware ───────────────────────────────────────
      - "traefik.http.middlewares.sec-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.sec-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.sec-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.sec-headers.headers.customFrameOptionsValue=DENY"
      - "traefik.http.middlewares.sec-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.sec-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_QUEUE_NAME=telegram_export
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME}
      # Внутренний API ключ — ApiKeyFilter fail-fast без него.
      - JAVA_API_KEY=${JAVA_API_KEY}
      # Dashboard SQLite
      - DASHBOARD_DB_PATH=${DASHBOARD_DB_PATH:-/data/stats/dashboard.db}
      # Dashboard auth (Telegram Login Widget)
      - DASHBOARD_ENABLE_BOOTSTRAP=${DASHBOARD_ENABLE_BOOTSTRAP:-true}
      - DASHBOARD_ADMIN_TG_ID=${DASHBOARD_ADMIN_TG_ID}
      # Redis Streams для ingestion статистики
      - STATS_STREAM_KEY=${STATS_STREAM_KEY:-stats:events}
      - STATS_STREAM_GROUP=${STATS_STREAM_GROUP:-dashboard-writer}
      - STATS_STREAM_CONSUMER=${STATS_STREAM_CONSUMER:-java-bot-1}
      - STATS_STREAM_MAXLEN=${STATS_STREAM_MAXLEN:-100000}
      - TRAEFIK_DASHBOARD_DOMAIN=${TRAEFIK_DASHBOARD_DOMAIN}
      # TON-адрес для секции "Поддержать" на /dashboard/about. Пусто → секция скрыта.
      - DONATE_TON=${DONATE_TON:-}
    volumes:
      - export-data:/data/export
      # Dashboard SQLite — host bind mount вне docker volumes, чтобы переживать
      # compose down / volume rm. Путь на хосте задаётся ${HOST_DATA_PATH} в .env,
      # директорию готовит админ (chown uid:gid соответствует user'у java-bot).
      - ${HOST_DATA_PATH:-/var/lib/telegram-cleaner}/dashboard:/data/stats
    networks:
      - traefik-proxy
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 150s
    mem_limit: 768m
    cpus: '0.75'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Python Worker
  # ===========================================================================
  python-worker:
    image: ghcr.io/thesmithmode/telegram-export-python-worker:latest
    container_name: telegram-export-worker
    labels:
      - "project=telegram-cleaner"
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_SESSION_STRING=${TELEGRAM_SESSION_STRING}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - JAVA_API_BASE_URL=http://java-bot:8080
      - JAVA_API_KEY=${JAVA_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_QUEUE_NAME=telegram_export
      - WORKER_NAME=export-worker-prod
      - MAX_WORKERS=1
      - JOB_TIMEOUT=1800
      - MAX_RETRIES=3
      - RETRY_BASE_DELAY=1.0
      - RETRY_MAX_DELAY=32.0
      - CACHE_DB_PATH=/data/cache/messages.db
      - CACHE_ENABLED=true
      - CACHE_MAX_DISK_GB=25
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      # Message cache SQLite — host bind mount вне docker volumes, чтобы переживать
      # compose down / volume rm. Путь на хосте задаётся ${HOST_DATA_PATH} в .env,
      # бэкапится cron'ом на хосте через ops/backup-cache.sh.
      - ${HOST_DATA_PATH:-/var/lib/telegram-cleaner}/cache:/data/cache
    depends_on:
      java-bot:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*main.py' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 768m
    cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Redis
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: telegram-export-redis
    labels:
      - "project=telegram-cleaner"
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 128mb --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  # Общая сеть для Traefik — создаётся вручную один раз: docker network create traefik-proxy
  # Сервисы которые должны быть доступны снаружи подключаются к этой сети.
  traefik-proxy:
    external: true
  # internal: java-bot ↔ worker ↔ redis (только внутренний трафик)
  internal:
    name: telegram-cleaner_internal

volumes:
  redis-data:
  export-data:
  traefik_acme:
  # cache-data и dashboard_data переведены на host bind mount (${HOST_DATA_PATH})
  # для стойкости к любым `compose down`/volume rm.
