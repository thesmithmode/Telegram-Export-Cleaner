<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--tec-surface);font-family:var(--tec-font-sans);color:var(--tec-text)}
.row{display:flex;gap:20px;align-items:center}
.card{background:#fff;border:1px solid var(--tec-border);padding:14px 18px;min-width:110px}
.lbl{font-size:10px;color:var(--tec-muted);font-family:var(--tec-font-mono);margin-top:4px}
</style></head><body>
<div class="row">
  <div><div class="card" style="border-radius:4px">radius-sm</div><div class="lbl">4px</div></div>
  <div><div class="card" style="border-radius:6px;box-shadow:0 1px 2px rgba(0,0,0,.05)">radius + shadow-sm</div><div class="lbl">6px · shadow-sm</div></div>
  <div><div class="card" style="border-radius:12px;padding:4px 12px;font-size:11px;background:#e8f5ea;color:#2b8a3e;border-color:transparent">radius-pill</div><div class="lbl">12px · chip</div></div>
  <div><div class="card" style="border-radius:18px;background:#eeffde;border-color:#eeffde">radius-bubble</div><div class="lbl">18px · TG bubble</div></div>
</div>
</body></html>
