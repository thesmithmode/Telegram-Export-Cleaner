<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--tec-surface);font-family:var(--tec-font-sans);color:var(--tec-text)}
.row{display:flex;gap:8px;align-items:flex-end}
.tok{display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{background:#2563eb;border-radius:2px}
.lbl{font-size:10px;color:var(--tec-muted);font-family:var(--tec-font-mono)}
</style></head><body>
<div class="row">
  <div class="tok"><div class="bar" style="width:4px;height:4px"></div><div class="lbl">1·4</div></div>
  <div class="tok"><div class="bar" style="width:8px;height:8px"></div><div class="lbl">2·8</div></div>
  <div class="tok"><div class="bar" style="width:12px;height:12px"></div><div class="lbl">3·12</div></div>
  <div class="tok"><div class="bar" style="width:16px;height:16px"></div><div class="lbl">4·16</div></div>
  <div class="tok"><div class="bar" style="width:24px;height:24px"></div><div class="lbl">5·24</div></div>
  <div class="tok"><div class="bar" style="width:32px;height:32px"></div><div class="lbl">6·32</div></div>
  <div class="tok"><div class="bar" style="width:48px;height:48px"></div><div class="lbl">7·48</div></div>
</div>
<div style="margin-top:14px;font-size:12px;color:var(--tec-muted)">4px grid · card padding 14–16 · gutter 24 · max-width 1200</div>
</body></html>
