<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--tec-surface);font-family:var(--tec-font-sans);color:var(--tec-text)}

<div class="stack">
