<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:22px;background:#7a93b5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;color:#000;min-height:100vh;box-sizing:border-box;-webkit-font-smoothing:antialiased}
.wrap{max-width:360px;margin:0 auto;display:flex;flex-direction:column;gap:6px}
.row{display:flex;flex-direction:column;align-items:flex-start;gap:2px}
.row.out{align-items:flex-end}
.bubble{background:#fff;border-radius:14px 14px 14px 4px;padding:7px 10px 6px;font-size:15px;line-height:1.32;color:#000;max-width:85%;box-shadow:0 1px 0.5px rgba(0,0,0,.13);white-space:pre-wrap;word-wrap:break-word}
.bubble.out{background:#eeffde;border-radius:14px 14px 4px 14px}
.meta{float:right;font-size:11px;color:#a0acb6;margin:5px 0 0 10px;font-variant-numeric:tabular-nums}
.meta.out{color:#5fb75b}
.check{margin-left:2px}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;color:#168acd}
b{font-weight:600}
</style></head><body>
<div class="wrap">
  <div class="row out"><div class="bubble out">31/02/2024<span class="meta out">14:35<span class="check">✓✓</span></span></div></div>

  <div class="row"><div class="bubble"><b>❌ Неверный формат</b>
Введите дату как <span class="mono">дд.мм.гггг</span>, например <span class="mono">01.01.2024</span>.<span class="meta">14:35</span></div></div>

  <div class="row"><div class="bubble"><b>⚠️ Слишком много запросов</b>
Дождитесь окончания текущего экспорта или отмените его.<span class="meta">14:36</span></div></div>
</div>
</body></html>
