<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:18px;background:var(--tec-bg);font-family:var(--tec-font-sans);color:var(--tec-text)}
.block{position:relative;background:var(--tec-surface);border:1px solid var(--tec-border);border-radius:var(--tec-radius);padding:18px 22px 14px;box-shadow:var(--tec-shadow-sm)}
.head{display:flex;align-items:flex-start;gap:16px;margin-bottom:14px;border-bottom:1px dashed var(--tec-border);padding-bottom:12px}
.eyebrow{font-family:var(--tec-font-mono);font-size:10px;color:var(--tec-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.eyebrow::before{content:'';width:14px;height:1px;background:var(--tec-text)}
.title{font-size:20px;font-weight:600;letter-spacing:-.3px;color:var(--tec-text);margin:0}
.title span{color:var(--tec-muted);font-weight:400}
.right{margin-left:auto;text-align:right}
.right__num{font-size:28px;font-weight:600;letter-spacing:-.5px;font-variant-numeric:tabular-nums;color:var(--tec-text);line-height:1;font-family:var(--tec-font-sans)}
.right__sub{font-size:11px;color:var(--tec-muted);font-family:var(--tec-font-mono);margin-top:6px;display:flex;gap:8px;justify-content:flex-end;align-items:center;letter-spacing:.3px}
.delta{color:var(--tec-success);font-weight:600}

.chart{position:relative;height:190px;margin:0 -6px}
.chart svg{width:100%;height:100%;display:block;overflow:visible}

.grid-line{stroke:var(--tec-border);stroke-width:1;stroke-dasharray:2 3}
.baseline{stroke:var(--tec-text);stroke-width:1}
.avg{stroke:var(--tec-danger);stroke-width:1;stroke-dasharray:3 3;opacity:.7}
.avg-lbl{font-size:9px;font-family:var(--tec-font-mono);fill:var(--tec-danger);letter-spacing:.5px}

.area{fill:var(--tec-accent);fill-opacity:.08}
.line{fill:none;stroke:var(--tec-accent);stroke-width:1.75;stroke-linejoin:round;stroke-linecap:round}
.dot{fill:var(--tec-surface);stroke:var(--tec-accent);stroke-width:1.75}
.dot.peak{fill:var(--tec-accent);stroke:var(--tec-accent)}
.peak-ring{fill:none;stroke:var(--tec-accent);stroke-width:1;opacity:.35}
.peak-label{font-size:10px;font-family:var(--tec-font-mono);fill:var(--tec-text);font-weight:600}
.axis{fill:var(--tec-muted);font-size:10px;font-family:var(--tec-font-mono);letter-spacing:.5px;text-transform:uppercase}
.axis.hi{fill:var(--tec-text);font-weight:700}
.y-lbl{fill:var(--tec-muted);font-size:9px;font-family:var(--tec-font-mono);letter-spacing:.3px}

.foot{display:flex;margin-top:14px;border-top:1px solid var(--tec-border);padding-top:12px}
.foot__cell{flex:1;padding:0 14px;border-right:1px solid var(--tec-border)}
.foot__cell:first-child{padding-left:0}
.foot__cell:last-child{padding-right:0;border-right:none}
.foot__lbl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--tec-muted);font-family:var(--tec-font-mono);margin-bottom:4px}
.foot__val{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--tec-text)}
.foot__val small{color:var(--tec-muted);font-weight:400;font-size:10px;margin-left:4px;font-family:var(--tec-font-mono)}

.corner{position:absolute;top:0;right:0;width:36px;height:36px;border:1px solid var(--tec-border);border-top:none;border-right:none;border-bottom-left-radius:var(--tec-radius);display:grid;place-items:center;font-family:var(--tec-font-mono);font-size:10px;color:var(--tec-muted)}
</style></head><body>
<div class="block">
  <div class="corner">№07</div>
  <div class="head">
    <div>
      <div class="eyebrow">fig. 02 — exports · weekly · line</div>
      <h2 class="title">Динамика экспортов <span>/ неделя</span></h2>
    </div>
    <div class="right">
      <div class="right__num">4 812</div>
      <div class="right__sub"><span class="delta">↑ 12.4%</span> vs prev · 7д</div>
    </div>
  </div>

  <div class="chart">
    <svg viewBox="0 0 620 190" preserveAspectRatio="none">
      <!-- grid -->
      <line class="grid-line" x1="0" y1="40" x2="620" y2="40"/>
      <line class="grid-line" x1="0" y1="90" x2="620" y2="90"/>
      <line class="grid-line" x1="0" y1="140" x2="620" y2="140"/>
      <!-- y-axis labels -->
      <text class="y-lbl" x="0" y="38">900</text>
      <text class="y-lbl" x="0" y="88">600</text>
      <text class="y-lbl" x="0" y="138">300</text>

      <!-- avg -->
      <line class="avg" x1="0" y1="88" x2="620" y2="88"/>
      <text class="avg-lbl" x="618" y="85" text-anchor="end">AVG · 687</text>

      <!-- baseline -->
      <line class="baseline" x1="0" y1="170" x2="620" y2="170"/>

      <!-- area + line: mon 412, tue 580, wed 640, thu 750, fri 821 (peak), sat 720, sun 640 -->
      <path class="area" d="M 54 130 L 140 98 L 226 87 L 312 68 L 398 45 L 484 73 L 570 87 L 570 170 L 54 170 Z"/>
      <path class="line" d="M 54 130 L 140 98 L 226 87 L 312 68 L 398 45 L 484 73 L 570 87"/>

      <!-- peak ring + callout -->
      <circle class="peak-ring" cx="398" cy="45" r="8"/>
      <line x1="398" y1="37" x2="398" y2="22" stroke="var(--tec-text)" stroke-width="1"/>
      <line x1="398" y1="22" x2="520" y2="22" stroke="var(--tec-text)" stroke-width="1"/>
      <text class="peak-label" x="520" y="19" text-anchor="end">↑ peak · 821</text>

      <!-- dots -->
      <circle class="dot" cx="54"  cy="130" r="3"/>
      <circle class="dot" cx="140" cy="98"  r="3"/>
      <circle class="dot" cx="226" cy="87"  r="3"/>
      <circle class="dot" cx="312" cy="68"  r="3"/>
      <circle class="dot peak" cx="398" cy="45" r="3.5"/>
      <circle class="dot" cx="484" cy="73"  r="3"/>
      <circle class="dot" cx="570" cy="87"  r="3"/>

      <!-- x-axis -->
      <g class="axis">
        <text x="54"  y="186" text-anchor="middle">пн</text>
        <text x="140" y="186" text-anchor="middle">вт</text>
        <text x="226" y="186" text-anchor="middle">ср</text>
        <text x="312" y="186" text-anchor="middle">чт</text>
        <text x="398" y="186" text-anchor="middle" class="hi">пт</text>
        <text x="484" y="186" text-anchor="middle">сб</text>
        <text x="570" y="186" text-anchor="middle">вс</text>
      </g>
    </svg>
  </div>

  <div class="foot">
    <div class="foot__cell"><div class="foot__lbl">Pk</div><div class="foot__val">821<small>Fri</small></div></div>
    <div class="foot__cell"><div class="foot__lbl">Avg</div><div class="foot__val">687<small>/день</small></div></div>
    <div class="foot__cell"><div class="foot__lbl">Min</div><div class="foot__val">412<small>Mon</small></div></div>
    <div class="foot__cell"><div class="foot__lbl">Σ week</div><div class="foot__val">4 812</div></div>
  </div>
</div>
</body></html>
