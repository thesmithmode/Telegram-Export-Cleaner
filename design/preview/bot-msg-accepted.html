<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:22px;background:#7a93b5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;color:#000;min-height:100vh;box-sizing:border-box;-webkit-font-smoothing:antialiased}
.wrap{max-width:360px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.row{display:flex;flex-direction:column;align-items:flex-start;gap:2px}
.row.out{align-items:flex-end}
.bubble{background:#fff;border-radius:14px 14px 14px 4px;padding:7px 10px 6px;font-size:15px;line-height:1.32;color:#000;max-width:85%;box-shadow:0 1px 0.5px rgba(0,0,0,.13);white-space:pre-wrap;word-wrap:break-word}
.bubble.out{background:#eeffde;border-radius:14px 14px 4px 14px}
.meta{float:right;font-size:11px;color:#a0acb6;margin:5px 0 0 10px;font-variant-numeric:tabular-nums}
.meta.out{color:#5fb75b}
.check{margin-left:2px}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;color:#168acd}
b{font-weight:600}
.kbd{display:flex;flex-direction:column;gap:2px;max-width:85%;width:100%}
.kbd-row{display:flex;gap:2px}
.kbd button{flex:1;background:rgba(255,255,255,.95);color:#168acd;border:none;padding:10px 6px;font:inherit;font-size:14px;font-weight:500;cursor:pointer;text-align:center;border-radius:6px;box-shadow:0 1px 0.5px rgba(0,0,0,.13);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;min-height:38px}
.kbd-row:last-child button{border-bottom-left-radius:14px;border-bottom-right-radius:14px}
.kbd-row:first-child button{border-top-left-radius:6px;border-top-right-radius:6px}
.emoji{font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji","Twemoji Mozilla",sans-serif;font-size:15px;line-height:1}
.unit{display:flex;flex-direction:column;gap:2px;width:100%;align-items:flex-start}
</style></head><body>
