<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:16px;background:var(--tec-surface);font-family:var(--tec-font-sans)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.chip{padding:6px 14px;border-radius:12px;font-size:12px;font-weight:500;border:1px solid transparent}
.sample{font-family:var(--tec-font-mono);font-size:11px;color:var(--tec-muted);margin-top:6px}
.cell{min-width:120px}
</style></head><body>
<div class="row">
  <div class="cell"><span class="chip" style="background:#e8f5ea;color:#2b8a3e">completed</span><div class="sample">#E8F5EA / #2B8A3E</div></div>
  <div class="cell"><span class="chip" style="background:#fbe9e9;color:#d64545">failed</span><div class="sample">#FBE9E9 / #D64545</div></div>
  <div class="cell"><span class="chip" style="background:#fff4e5;color:#b7791f">processing</span><div class="sample">#FFF4E5 / #B7791F</div></div>
  <div class="cell"><span class="chip" style="background:#e5edff;color:#3358d4">queued</span><div class="sample">#E5EDFF / #3358D4</div></div>
  <div class="cell"><span class="chip" style="background:#f5f6f8;color:#666e7b">cancelled</span><div class="sample">#F5F6F8 / #666E7B</div></div>
</div>
</body></html>
