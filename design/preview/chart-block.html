<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:18px;background:#eef0f4;font-family:var(--tec-font-sans);color:var(--tec-text)}
.block{position:relative;background:#fff;border:1px solid var(--tec-border);border-radius:4px;padding:18px 22px 14px;box-shadow:0 1px 2px rgba(0,0,0,.04);font-family:var(--tec-font-sans)}
.head{display:flex;align-items:flex-start;gap:16px;margin-bottom:14px;border-bottom:1px dashed var(--tec-border);padding-bottom:12px}
.eyebrow{font-family:var(--tec-font-mono);font-size:10px;color:var(--tec-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.eyebrow::before{content:'';width:14px;height:1px;background:var(--tec-text)}
.title{font-size:22px;font-weight:500;letter-spacing:-.4px;color:var(--tec-text);margin:0}
.title span{color:var(--tec-muted);font-weight:400}
.right{margin-left:auto;text-align:right}
.right__num{font-size:30px;font-weight:600;letter-spacing:-.8px;font-variant-numeric:tabular-nums;color:var(--tec-text);line-height:1}
.right__sub{font-size:11px;color:var(--tec-muted);font-family:var(--tec-font-mono);margin-top:6px;display:flex;gap:8px;justify-content:flex-end;align-items:center}
.delta{color:#2b8a3e;font-weight:600}

.chart{position:relative;height:190px;margin:0 -6px}
.chart svg{width:100%;height:100%;display:block;overflow:visible}

.bar{fill:#e3e6ea;transition:fill .2s}
.bar.hi{fill:#1f2430}
.peak-label{font-size:10px;font-family:var(--tec-font-mono);fill:var(--tec-text);font-weight:600}
.axis{fill:#98a0ac;font-size:10px;font-family:var(--tec-font-mono);letter-spacing:.5px;text-transform:uppercase}
.baseline{stroke:var(--tec-text);stroke-width:1}
.avg{stroke:#d64545;stroke-width:1;stroke-dasharray:3 3}
.avg-lbl{font-size:9px;font-family:var(--tec-font-mono);fill:#d64545;letter-spacing:.5px}

.foot{display:flex;align-items:stretch;margin-top:14px;gap:0;border-top:1px solid var(--tec-border);padding-top:12px}
.foot__cell{flex:1;padding:0 14px;border-right:1px solid var(--tec-border)}
.foot__cell:first-child{padding-left:0}
.foot__cell:last-child{padding-right:0;border-right:none}
.foot__lbl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--tec-muted);font-family:var(--tec-font-mono);margin-bottom:4px}
.foot__val{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--tec-text)}
.foot__val small{color:var(--tec-muted);font-weight:400;font-size:10px;margin-left:4px;font-family:var(--tec-font-mono)}

.corner{position:absolute;top:0;right:0;width:36px;height:36px;border:1px solid var(--tec-border);border-top:none;border-right:none;border-bottom-left-radius:4px;display:grid;place-items:center;font-family:var(--tec-font-mono);font-size:10px;color:var(--tec-muted)}
</style></head><body>
<div class="block">
  <div class="corner">№07</div>
  <div class="head">
    <div>
      <div class="eyebrow">fig. 01 — exports · weekly</div>
      <h2 class="title">Динамика экспортов <span>/ неделя</span></h2>
    </div>
    <div class="right">
      <div class="right__num">4 812</div>
      <div class="right__sub"><span class="delta">↑ 12.4%</span> vs prev · 7д</div>
    </div>
  </div>

  <div class="chart">
    <svg viewBox="0 0 620 190" preserveAspectRatio="none">
      <!-- avg line -->
      <line class="avg" x1="0" y1="95" x2="620" y2="95"/>
      <text class="avg-lbl" x="618" y="92" text-anchor="end">AVG · 687</text>
      <!-- baseline -->
      <line class="baseline" x1="0" y1="170" x2="620" y2="170"/>
      <!-- bars -->
      <g>
        <rect class="bar" x="20"  y="128" width="68" height="42"/>
        <rect class="bar" x="106" y="108" width="68" height="62"/>
        <rect class="bar" x="192" y="118" width="68" height="52"/>
        <rect class="bar" x="278" y="78"  width="68" height="92"/>
        <rect class="bar hi" x="364" y="42" width="68" height="128"/>
        <rect class="bar" x="450" y="70"  width="68" height="100"/>
        <rect class="bar" x="536" y="92"  width="68" height="78"/>
      </g>
      <!-- peak annotation -->
      <line x1="398" y1="42" x2="398" y2="22" stroke="#1f2430" stroke-width="1"/>
      <line x1="398" y1="22" x2="520" y2="22" stroke="#1f2430" stroke-width="1"/>
      <text class="peak-label" x="520" y="19" text-anchor="end">↑ peak · 821</text>
      <!-- x axis -->
      <g class="axis">
        <text x="54"  y="186" text-anchor="middle">пн</text>
        <text x="140" y="186" text-anchor="middle">вт</text>
        <text x="226" y="186" text-anchor="middle">ср</text>
        <text x="312" y="186" text-anchor="middle">чт</text>
        <text x="398" y="186" text-anchor="middle" style="font-weight:700;fill:#1f2430">пт</text>
        <text x="484" y="186" text-anchor="middle">сб</text>
        <text x="570" y="186" text-anchor="middle">вс</text>
      </g>
    </svg>
  </div>

  <div class="foot">
    <div class="foot__cell"><div class="foot__lbl">Pk</div><div class="foot__val">821<small>Fri</small></div></div>
    <div class="foot__cell"><div class="foot__lbl">Avg</div><div class="foot__val">687<small>/день</small></div></div>
    <div class="foot__cell"><div class="foot__lbl">Min</div><div class="foot__val">412<small>Mon</small></div></div>
    <div class="foot__cell"><div class="foot__lbl">Σ week</div><div class="foot__val">4 812</div></div>
  </div>
</div>
</body></html>
