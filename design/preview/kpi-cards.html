<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:16px;background:var(--tec-bg);font-family:var(--tec-font-sans);color:var(--tec-text)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.kpi{background:#fff;border:1px solid var(--tec-border);border-radius:6px;padding:14px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.lbl{font-size:12px;color:var(--tec-muted);text-transform:uppercase;letter-spacing:.5px}
.val{font-size:24px;font-weight:600;margin-top:4px}
</style></head><body>
<div class="grid">
  <div class="kpi"><div class="lbl">Экспортов</div><div class="val">12 483</div></div>
  <div class="kpi"><div class="lbl">Сообщений</div><div class="val">4 912 003</div></div>
  <div class="kpi"><div class="lbl">Объём</div><div class="val">2.4 GB</div></div>
  <div class="kpi"><div class="lbl">Пользователей</div><div class="val">318</div></div>
</div>
</body></html>
