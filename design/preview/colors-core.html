<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:16px;background:var(--tec-surface);font-family:var(--tec-font-sans);color:var(--tec-text)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:120px}
.chip{width:100%;aspect-ratio:2/1;border:1px solid var(--tec-border);border-radius:6px}
.name{margin-top:6px;font-size:11px;font-weight:600;color:var(--tec-text)}
.hex{font-family:var(--tec-font-mono);font-size:10px;color:var(--tec-muted)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#f5f6f8"></div><div class="name">bg</div><div class="hex">#F5F6F8</div></div>
  <div class="sw"><div class="chip" style="background:#ffffff"></div><div class="name">surface</div><div class="hex">#FFFFFF</div></div>
  <div class="sw"><div class="chip" style="background:#e3e6ea"></div><div class="name">border</div><div class="hex">#E3E6EA</div></div>
  <div class="sw"><div class="chip" style="background:#666e7b"></div><div class="name" style="color:var(--tec-text)">muted</div><div class="hex">#666E7B</div></div>
  <div class="sw"><div class="chip" style="background:#1f2430"></div><div class="name">text</div><div class="hex">#1F2430</div></div>
  <div class="sw"><div class="chip" style="background:#2563eb"></div><div class="name">accent</div><div class="hex">#2563EB</div></div>
</div>
</body></html>
