<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:22px;background:#7a93b5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;color:#000;min-height:100vh;box-sizing:border-box;-webkit-font-smoothing:antialiased}
.wrap{max-width:360px;margin:0 auto;display:flex;flex-direction:column;gap:6px}
.row{display:flex;flex-direction:column;align-items:flex-start;gap:2px}
.bubble{background:#fff;border-radius:14px 14px 14px 4px;padding:7px 10px 6px;font-size:15px;line-height:1.32;color:#000;max-width:85%;box-shadow:0 1px 0.5px rgba(0,0,0,.13);white-space:pre-wrap;word-wrap:break-word}
.meta{float:right;font-size:11px;color:#a0acb6;margin:5px 0 0 10px;font-variant-numeric:tabular-nums}
b{font-weight:600}
.emoji{font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji","Twemoji Mozilla",sans-serif;font-size:15px;line-height:1}

.doc{display:flex;align-items:center;gap:10px;padding:4px 0 2px;min-width:220px}
.doc__ic{width:44px;height:44px;border-radius:50%;background:#3aa6e6;color:#fff;display:grid;place-items:center;font-size:10px;font-weight:700;letter-spacing:.3px;flex-shrink:0}
.doc__name{font-size:15px;font-weight:500;color:#000;line-height:1.2}
.doc__sub{font-size:13px;color:#707579;margin-top:2px}
</style></head><body>
<div class="wrap">
  <div class="row"><div class="bubble"><span class="emoji">⚡</span> Данные найдены в кэше — результат будет быстро.<span class="meta">14:32</span></div></div>

  <div class="row"><div class="bubble"><b>✅ Экспорт готов</b>
12 483 сообщений за выбранный период.<span class="meta">14:34</span></div></div>

  <div class="row"><div class="bubble">
    <div class="doc">
      <div class="doc__ic">TXT</div>
      <div>
        <div class="doc__name">output.txt</div>
        <div class="doc__sub">4.2 KB · txt</div>
      </div>
    </div>
    <span class="meta">14:34</span>
  </div></div>
</div>
</body></html>
