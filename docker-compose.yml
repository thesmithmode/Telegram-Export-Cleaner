version: '3.8'

# Docker Compose for Telegram Export Cleaner
#
# Services:
# - redis: Queue backend (RQ)
# - java-bot: Java Spring Boot backend (if running locally)
# - export-worker: Python export worker (Pyrogram)
#
# Usage:
#   docker-compose up -d                # Start all services
#   docker-compose logs -f export-worker # Follow logs
#   docker-compose down                 # Stop all services
#
# Requirements:
#   1. Copy .env.example to .env
#   2. Fill in TELEGRAM_API_ID and TELEGRAM_API_HASH
#   3. Ensure Java Bot is running (or remove java-bot service)

services:
  # =========================================================================
  # Redis: Message Queue & Job Store
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: telegram-export-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --appendfsync always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - telegram-export
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Export Worker: Python + Pyrogram
  # =========================================================================
  export-worker:
    build:
      context: .
      dockerfile: export-worker/Dockerfile
    container_name: telegram-export-worker
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # Telegram API
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_PHONE=${TELEGRAM_PHONE}

      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_QUEUE_NAME=${REDIS_QUEUE_NAME:-telegram_export}

      # Java Bot API
      - JAVA_API_BASE_URL=${JAVA_API_BASE_URL:-http://java-bot:8080}
      - JAVA_API_KEY=${JAVA_API_KEY}

      # Worker (optimized for weak server: 1 core, 3-4GB RAM)
      - WORKER_NAME=${WORKER_NAME:-export-worker-docker}
      - MAX_WORKERS=${MAX_WORKERS:-1}
      - JOB_TIMEOUT=${JOB_TIMEOUT:-1800}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - RETRY_BASE_DELAY=${RETRY_BASE_DELAY:-1.0}
      - RETRY_MAX_DELAY=${RETRY_MAX_DELAY:-32.0}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1

    volumes:
      # Persistent session storage (important!)
      - ./export-worker/session:/app/session
      # Logs (optional)
      - ./export-worker/logs:/app/logs

    networks:
      - telegram-export
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  telegram-export:
    driver: bridge

volumes:
  redis_data:
    driver: local
