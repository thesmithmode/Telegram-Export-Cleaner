# Docker Compose for Telegram Export Cleaner
#
# Services:
# - redis: Queue backend (RQ)
# - java-bot: Java Spring Boot backend (if running locally)
# - export-worker: Python export worker (Pyrogram)
#
# Usage:
#   docker-compose up -d                # Start all services
#   docker-compose logs -f export-worker # Follow logs
#   docker-compose down                 # Stop all services
#
# Requirements:
#   1. Copy .env.example to .env
#   2. Fill in TELEGRAM_API_ID and TELEGRAM_API_HASH
#   3. Ensure Java Bot is running (or remove java-bot service)

services:
  # =========================================================================
  # Redis: Message Queue & Job Store
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: telegram-export-redis
    volumes:
      - redis_data:/data
    # Кэш сообщений переехал в SQLite на диск — Redis теперь только для очереди и статусов.
    # noeviction: выбрасывает ошибку при переполнении вместо тихого удаления ключей.
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy noeviction
    mem_limit: 512m
    cpus: '0.25'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - telegram-export
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Java Bot: Spring Boot API + Telegram Bot
  # =========================================================================
  java-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-export-java-bot
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_QUEUE_NAME=${REDIS_QUEUE_NAME:-telegram_export}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-ExportCleanerBot}
      # Dashboard SQLite — путь внутри контейнера, файл живёт в volume dashboard_data
      - DASHBOARD_DB_PATH=${DASHBOARD_DB_PATH:-/data/stats/dashboard.db}
      # Dashboard auth (Telegram Login Widget)
      - DASHBOARD_ADMIN_TG_ID=${DASHBOARD_ADMIN_TG_ID}
      - DASHBOARD_ENABLE_BOOTSTRAP=${DASHBOARD_ENABLE_BOOTSTRAP:-false}
      # TON-адрес для секции "Поддержать" на /dashboard/about. Пусто → секция скрыта.
      - DONATE_TON=${DONATE_TON:-}
    volumes:
      - java_import:/data/import
      - java_export:/data/export
      # Dashboard БД (статистика, логины) — bind mount, переживает любые compose операции.
      # Перед первым запуском: mkdir -p ./dashboard && sudo chown 100:101 ./dashboard
      - ./dashboard:/data/stats
    # Снижено с 1024m: кэш сообщений больше не в JVM, достаточно 768m.
    mem_limit: 768m
    cpus: '0.5'
    networks:
      - telegram-export
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Export Worker: Python + Pyrogram
  # =========================================================================
  export-worker:
    build:
      context: ./export-worker
      dockerfile: Dockerfile
    container_name: telegram-export-worker
    depends_on:
      redis:
        condition: service_healthy
      java-bot:
        condition: service_healthy
    # Увеличено с 512m: больше памяти для in-flight батчей и Pyrogram.
    mem_limit: 768m
    cpus: '0.5'
    environment:
      # Telegram API
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_PHONE_NUMBER=${TELEGRAM_PHONE_NUMBER}
      - TELEGRAM_SESSION_STRING=${TELEGRAM_SESSION_STRING:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}

      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_QUEUE_NAME=${REDIS_QUEUE_NAME:-telegram_export}

      # Java Bot API
      - JAVA_API_BASE_URL=${JAVA_API_BASE_URL:-http://java-bot:8080}

      # Worker (optimized for weak server: 1 core, 3-4GB RAM)
      - WORKER_NAME=${WORKER_NAME:-export-worker-docker}
      - MAX_WORKERS=${MAX_WORKERS:-1}
      - JOB_TIMEOUT=${JOB_TIMEOUT:-1800}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - RETRY_BASE_DELAY=${RETRY_BASE_DELAY:-1.0}
      - RETRY_MAX_DELAY=${RETRY_MAX_DELAY:-32.0}

      # SQLite message cache
      - CACHE_DB_PATH=/data/cache/messages.db
      - CACHE_MAX_DISK_GB=${CACHE_MAX_DISK_GB:-25}
      - CACHE_ENABLED=${CACHE_ENABLED:-true}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1

    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*main.py' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      # Persistent session storage (important!)
      - ./export-worker/session:/app/session
      # Logs (optional)
      - ./export-worker/logs:/app/logs
      # SQLite message cache — bind mount на хост, переживает любые compose операции.
      # Перед первым запуском: mkdir -p ./cache && sudo chown 999:999 ./cache
      - ./cache:/data/cache

    networks:
      - telegram-export
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  telegram-export:
    driver: bridge

volumes:
  redis_data:
    driver: local
  java_import:
    driver: local
  java_export:
    driver: local
  # cache_data и dashboard_data переведены на bind mount (./cache и ./dashboard)
  # — переживают `compose down`/volume rm.
