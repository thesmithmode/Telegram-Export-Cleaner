name: bench-ux

on:
  push:
    branches: [ux-fast]

jobs:
  bench:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install psutil

      - name: bench_dashboard
        timeout-minutes: 3
        run: |
          set -o pipefail
          mkdir -p .codex/autoresearch
          python .codex/autoresearch/bench_dashboard.py | tee .codex/autoresearch/run_dashboard.log

      - name: Summary
        if: always()
        run: |
          echo "## bench-ux results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "^[a-z_]+:" .codex/autoresearch/run_dashboard.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
