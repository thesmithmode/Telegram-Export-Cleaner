name: bench-ux

on:
  push:
    branches: [ux-fast]

jobs:
  bench:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install psutil

      - name: bench_dashboard
        timeout-minutes: 3
        run: python .claude/autoresearch/bench_dashboard.py | tee .claude/autoresearch/run_dashboard.log

      - name: Summary
        if: always()
        run: |
          echo "## bench-ux results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "^[a-z_]+:" .claude/autoresearch/run_dashboard.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
