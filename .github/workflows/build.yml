name: CI/CD

on:
  push:
    branches: [ main ]

jobs:

  # ─── 1. Сборка и тесты ───────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn clean package

  # ─── 2. Сборка и публикация Docker-образа ────────────────────────────────────
  docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/telegram-export-cleaner
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─── 3. Деплой на сервер ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GH_TOKEN,GH_ACTOR
          script: |
            mkdir -p /root/telegram-cleaner && cd /root/telegram-cleaner
            cat <<EOF > docker-compose.yml
            services:
              telegram-cleaner:
                image: ghcr.io/${{ github.repository_owner }}/telegram-export-cleaner:latest
                ports: ["127.0.0.1:8081:8080"]
                environment:
                  - REDIS_HOST=redis
                  - REDIS_PORT=6379
                depends_on: { redis: { condition: service_healthy } }
                restart: unless-stopped
              redis:
                image: redis:7-alpine
                healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 10s }
                restart: unless-stopped
            EOF
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
