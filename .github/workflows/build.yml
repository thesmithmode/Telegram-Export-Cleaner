name: CI/CD

on:
  push:
    branches: [ main ]

# На main не отменяем — важные деплои должны дойти до конца
concurrency:
  group: build-${{ github.sha }}
  cancel-in-progress: false

jobs:

  # ─── 1. Сборка и тесты Java ──────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn clean package

  # ─── 1b. Python тесты (гейт для docker/deploy) ───────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Create environment file
        run: |
          cat > export-worker/.env << EOF
          TELEGRAM_API_ID=1
          TELEGRAM_API_HASH=test_hash_for_ci
          TELEGRAM_PHONE_NUMBER=+1234567890
          TELEGRAM_BOT_TOKEN=000000000:AAAAAA
          REDIS_HOST=localhost
          REDIS_PORT=6379
          JAVA_API_BASE_URL=http://localhost:8080
          LOG_LEVEL=DEBUG
          CACHE_ENABLED=false
          EOF

      - name: Install dependencies
        run: |
          cd export-worker
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff

      - name: Lint Python (ruff)
        run: |
          cd export-worker
          # Критичные правила: F (pyflakes — unused, undefined), E9 (syntax),
          # W605 (invalid escape). Расширять набор постепенно, не одним махом,
          # чтобы lint не стал noise-gate.
          ruff check --select F,E9,W605 --exclude tests .

      - name: Run Python tests
        run: |
          cd export-worker
          pytest \
            tests/test_models.py \
            tests/test_json_converter.py \
            tests/test_export_worker.py \
            tests/test_message_cache.py \
            tests/test_queue_consumer.py \
            tests/test_pyrogram_client.py \
            tests/test_java_client.py \
            -v --tb=short

  # ─── 2. Сборка и публикация Docker-образа ────────────────────────────────────
  docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: [test, python-tests]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/telegram-export-cleaner
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Java API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract python-worker metadata
        id: python_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/telegram-export-python-worker
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push Python worker
        uses: docker/build-push-action@v6
        with:
          context: ./export-worker
          file: export-worker/Dockerfile
          push: true
          tags: ${{ steps.python_meta.outputs.tags }}
          labels: ${{ steps.python_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 3. Деплой на сервер ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: docker-compose.prod.yml
          target: ${{ secrets.SERVER_DEPLOY_PATH }}/
          strip_components: 0

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GH_TOKEN,GH_ACTOR
          script: |
            cd ${{ secrets.SERVER_DEPLOY_PATH }}

            # ── Секреты в .env (не коммитится) ──────────────────────────────
            # Структура сервисов — в docker-compose.prod.yml (в репо).
            # Разделение: конфиг → git, секреты → GitHub Secrets → .env на сервере.
            cat > .env << 'ENVEOF'
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}
            TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}
            TELEGRAM_SESSION_STRING=${{ secrets.TELEGRAM_SESSION_STRING }}
            DASHBOARD_ADMIN_PASSWORD=${{ secrets.DASHBOARD_ADMIN_PASSWORD }}
            DASHBOARD_TEST_PASSWORD=${{ secrets.DASHBOARD_TEST_PASSWORD }}
            TRAEFIK_DASHBOARD_DOMAIN=${{ secrets.TRAEFIK_DASHBOARD_DOMAIN }}
            TRAEFIK_ACME_EMAIL=${{ secrets.TRAEFIK_ACME_EMAIL }}
            TRAEFIK_DATA_PATH=${{ secrets.TRAEFIK_DATA_PATH }}
            ENVEOF

            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker compose -f docker-compose.prod.yml --env-file .env pull
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans

            # ── Post-deploy smoke test ──────────────────────────────────────
            # Раньше deploy считался успешным, если `compose up -d` вернул 0,
            # даже если java-bot тут же крашился (OOM, битая миграция, bad env).
            # Теперь ждём, пока /api/health ответит 200, иначе job становится
            # красным и команда видит сломанный прод сразу, а не через час по
            # жалобам пользователей.
            echo "⏳ Ждём /api/health (до 90 сек)..."
            HEALTH_OK=""
            for i in $(seq 1 30); do
              if docker exec telegram-export-java-bot wget -qO/dev/null http://localhost:8080/api/health 2>/dev/null; then
                HEALTH_OK=1
                echo "✅ java-bot жив после $((i*3)) сек"
                break
              fi
              sleep 3
            done
            if [ -z "$HEALTH_OK" ]; then
              echo "❌ /api/health не отвечает 90 сек — деплой сломан"
              echo "--- docker ps ---"
              docker compose -f docker-compose.prod.yml ps
              echo "--- java-bot logs (tail 100) ---"
              docker compose -f docker-compose.prod.yml logs --tail=100 java-bot || true
              echo "--- python-worker logs (tail 50) ---"
              docker compose -f docker-compose.prod.yml logs --tail=50 python-worker || true
              exit 1
            fi

            # ── Запуск python-worker после того как java-bot здоров ───────────
            # docker compose up -d не гарантирует запуск сервисов с
            # depends_on: condition: service_healthy если зависимость в момент
            # up ещё не healthy. Явный up -d python-worker идемпотентен:
            # не трогает уже запущенный, создаёт и запускает если отсутствует.
            echo "⏳ Запускаем python-worker..."
            docker compose -f docker-compose.prod.yml --env-file .env up -d python-worker
            WORKER_OK=""
            for i in $(seq 1 20); do
              WORKER_STATUS=$(docker inspect --format='{{.State.Status}}' telegram-export-worker 2>/dev/null || echo "missing")
              if [ "$WORKER_STATUS" = "running" ]; then
                WORKER_OK=1
                echo "✅ python-worker запущен после $((i*3)) сек"
                break
              fi
              sleep 3
            done
            if [ -z "$WORKER_OK" ]; then
              echo "❌ python-worker не запустился за 60 сек"
              docker compose -f docker-compose.prod.yml logs --tail=50 python-worker || true
              exit 1
            fi

            # Clean up only our project images (avoid deleting other containers on server).
            # Фильтруем по label=project=telegram-cleaner (задан в Dockerfile), чтобы НЕ снести образы
            # других сервисов, живущих на том же хосте.
            # until=24h убран намеренно: деплой каждые 2-4 часа, dangling образы моложе 24ч
            # не попадали под фильтр — отсюда накопление до 20+ образов (~6 GB).
            docker image prune --filter "label=project=telegram-cleaner" -f
            docker container prune --filter "label=project=telegram-cleaner" -f
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
