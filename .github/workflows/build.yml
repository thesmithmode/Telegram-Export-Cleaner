name: Build and Deploy
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and Test
        run: mvn clean package
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/telegram-export-cleaner:latest
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Передаём токен через переменную окружения, а не через shell-подстановку.
          # Прямая подстановка ${{ secrets.GITHUB_TOKEN }} в тело скрипта опасна:
          # значение раскрывается до выполнения шага и может появиться в ps aux.
          envs: GH_TOKEN,GH_ACTOR
          script: |
            mkdir -p /root/telegram-cleaner && cd /root/telegram-cleaner
            echo "APP_ADMIN_USER=$APP_ADMIN_USER" > .env
            echo "APP_ADMIN_PASSWORD=$APP_ADMIN_PASSWORD" >> .env
            cat <<EOF > docker-compose.yml
            services:
              telegram-cleaner:
                image: ghcr.io/${{ github.repository_owner }}/telegram-export-cleaner:latest
                ports: ["127.0.0.1:8081:8080"]
                env_file: [".env"]
                environment:
                  - REDIS_HOST=redis
                  - REDIS_PORT=6379
                depends_on: { redis: { condition: service_healthy } }
                restart: unless-stopped
              redis:
                image: redis:7-alpine
                healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 10s }
                restart: unless-stopped
            EOF
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          APP_ADMIN_USER: ${{ secrets.APP_ADMIN_USER }}
          APP_ADMIN_PASSWORD: ${{ secrets.APP_ADMIN_PASSWORD }}
