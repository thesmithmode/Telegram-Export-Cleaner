name: CI/CD

on:
  push:
    branches: [ main ]

# На main не отменяем — важные деплои должны дойти до конца
concurrency:
  group: build-${{ github.sha }}
  cancel-in-progress: false

jobs:

  # ─── 1. Сборка и тесты Java ──────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn clean package

  # ─── 1b. Python тесты (reusable workflow — единый источник истины) ───────────
  python-tests:
    name: Python Tests
    uses: ./.github/workflows/python-tests.yml

  # ─── 2. Сборка и публикация Docker-образа ────────────────────────────────────
  docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: [test, python-tests]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/telegram-export-cleaner
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Java API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract python-worker metadata
        id: python_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/telegram-export-python-worker
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push Python worker
        uses: docker/build-push-action@v6
        with:
          context: ./export-worker
          file: export-worker/Dockerfile
          push: true
          tags: ${{ steps.python_meta.outputs.tags }}
          labels: ${{ steps.python_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 3. Деплой на сервер ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to server
        # SECURITY: pin to SHA to prevent supply-chain attack (tag can be moved).
        # To update: gh api repos/appleboy/scp-action/git/refs/tags/v0.1.7 --jq '.object.sha'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: docker-compose.prod.yml
          target: ${{ secrets.SERVER_DEPLOY_PATH }}/
          strip_components: 0

      - name: SSH Deploy
        # SECURITY: pin to SHA to prevent supply-chain attack (tag can be moved).
        # To update: gh api repos/appleboy/ssh-action/git/refs/tags/v1.0.3 --jq '.object.sha'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GH_TOKEN,GH_ACTOR
          script: |
            set -euo pipefail
            cd ${{ secrets.SERVER_DEPLOY_PATH }}

            # ── Внешняя сеть для Traefik (создаём idempotent) ────────────────
            # docker-compose.prod.yml объявляет traefik-proxy как external:
            # если сеть отсутствует, compose up падает на первом деплое.
            docker network inspect traefik-proxy >/dev/null 2>&1 \
              || docker network create traefik-proxy

            # ── Секреты в .env (не коммитится) ──────────────────────────────
            # Структура сервисов — в docker-compose.prod.yml (в репо).
            # Разделение: конфиг → git, секреты → GitHub Secrets → .env на сервере.
            umask 077
            {
              echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}"
              echo "TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}"
              echo "TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}"
              echo "TELEGRAM_SESSION_STRING=${{ secrets.TELEGRAM_SESSION_STRING }}"
              echo "DASHBOARD_ADMIN_TG_ID=${{ secrets.DASHBOARD_ADMIN_TG_ID }}"
              echo "TRAEFIK_DASHBOARD_DOMAIN=${{ secrets.TRAEFIK_DASHBOARD_DOMAIN }}"
              echo "TRAEFIK_ACME_EMAIL=${{ secrets.TRAEFIK_ACME_EMAIL }}"
              echo "TRAEFIK_DATA_PATH=${{ secrets.TRAEFIK_DATA_PATH }}"
              echo "HOST_DATA_PATH=${{ secrets.HOST_DATA_PATH }}"
              echo "TELEGRAM_BOT_USERNAME=${{ secrets.TELEGRAM_BOT_USERNAME }}"
              echo "JAVA_API_KEY=${{ secrets.JAVA_API_KEY }}"
              echo "DONATE_TON=${{ secrets.DONATE_TON }}"
              echo "IMAGE_TAG=$(echo '${{ github.sha }}' | cut -c1-7)"
            } > .env
            chmod 600 .env

            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            # ── Atomic deploy: pin предыдущие :latest как :rollback ─────────
            # Требование: либо весь стек поднялся и здоров, либо никакого
            # частичного состояния. Раньше при health fail новые контейнеры
            # оставались запущенными (сломанные), а старые :latest уже были
            # перетёрты pull'ом — откатываться было нечем. Теперь перед pull
            # сохраняем текущие image id как :rollback и восстанавливаем их
            # при любой ошибке в критическом блоке.
            JAVA_IMG=ghcr.io/${{ github.repository_owner }}/telegram-export-cleaner
            WORKER_IMG=ghcr.io/${{ github.repository_owner }}/telegram-export-python-worker

            PREV_JAVA_ID=$(docker image inspect "$JAVA_IMG:latest" --format='{{.Id}}' 2>/dev/null || echo "")
            PREV_WORKER_ID=$(docker image inspect "$WORKER_IMG:latest" --format='{{.Id}}' 2>/dev/null || echo "")
            # if-форма обязательна под `set -e`: `[ -n "" ] && cmd` exit 1 уронит скрипт.
            if [ -n "$PREV_JAVA_ID" ];   then docker tag "$PREV_JAVA_ID"   "$JAVA_IMG:rollback";   fi
            if [ -n "$PREV_WORKER_ID" ]; then docker tag "$PREV_WORKER_ID" "$WORKER_IMG:rollback"; fi
            echo "Rollback checkpoint: java=${PREV_JAVA_ID:-none} worker=${PREV_WORKER_ID:-none}"

            rollback() {
              echo "🔙 Откат стека на предыдущие образы..."
              if [ -n "$PREV_JAVA_ID" ];   then docker tag "$JAVA_IMG:rollback"   "$JAVA_IMG:latest";   fi
              if [ -n "$PREV_WORKER_ID" ]; then docker tag "$WORKER_IMG:rollback" "$WORKER_IMG:latest"; fi
              if [ -z "$PREV_JAVA_ID" ] && [ -z "$PREV_WORKER_ID" ]; then
                echo "⚠️  Нет rollback-точки (первый деплой) — останавливаем стек, прод в down state"
                docker compose -f docker-compose.prod.yml --env-file .env down || true
                return
              fi
              docker compose -f docker-compose.prod.yml --env-file .env up -d --force-recreate --remove-orphans
            }

            docker compose -f docker-compose.prod.yml --env-file .env pull
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans

            # ── Post-deploy smoke test ──────────────────────────────────────
            echo "⏳ Ждём /api/health (до 90 сек)..."
            HEALTH_OK=""
            for i in $(seq 1 30); do
              if docker exec telegram-export-java-bot wget -qO/dev/null http://localhost:8080/api/health 2>/dev/null; then
                HEALTH_OK=1
                echo "✅ java-bot жив после $((i*3)) сек"
                break
              fi
              sleep 3
            done
            if [ -z "$HEALTH_OK" ]; then
              echo "❌ /api/health не отвечает 90 сек — деплой сломан"
              echo "--- docker ps ---"
              docker compose -f docker-compose.prod.yml ps
              echo "--- java-bot logs (tail 100) ---"
              docker compose -f docker-compose.prod.yml logs --tail=100 java-bot || true
              echo "--- python-worker logs (tail 50) ---"
              docker compose -f docker-compose.prod.yml logs --tail=50 python-worker || true
              rollback
              exit 1
            fi

            # ── Запуск python-worker после того как java-bot здоров ───────────
            echo "⏳ Запускаем python-worker..."
            docker compose -f docker-compose.prod.yml --env-file .env up -d python-worker
            WORKER_OK=""
            for i in $(seq 1 20); do
              WORKER_STATUS=$(docker inspect --format='{{.State.Status}}' telegram-export-worker 2>/dev/null || echo "missing")
              if [ "$WORKER_STATUS" = "running" ]; then
                WORKER_OK=1
                echo "✅ python-worker запущен после $((i*3)) сек"
                break
              fi
              sleep 3
            done
            if [ -z "$WORKER_OK" ]; then
              echo "❌ python-worker не запустился за 60 сек"
              docker compose -f docker-compose.prod.yml logs --tail=50 python-worker || true
              rollback
              exit 1
            fi

            # Clean up only our project images (avoid deleting other containers on server).
            # Фильтруем по label=project=telegram-cleaner. :rollback НЕ удаляется
            # (назначенный тег не dangling), что сохраняет точку отката до следующего деплоя.
            docker image prune --filter "label=project=telegram-cleaner" -f
            docker container prune --filter "label=project=telegram-cleaner" -f
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
