name: CI/CD

on:
  push:
    branches: [ main ]

# На main не отменяем — важные деплои должны дойти до конца
concurrency:
  group: build-${{ github.sha }}
  cancel-in-progress: false

jobs:

  # ─── 1. Сборка и тесты Java ──────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn clean package

  # ─── 1b. Python тесты (гейт для docker/deploy) ───────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Create environment file
        run: |
          cat > export-worker/.env << EOF
          TELEGRAM_API_ID=1
          TELEGRAM_API_HASH=test_hash_for_ci
          TELEGRAM_PHONE_NUMBER=+1234567890
          TELEGRAM_BOT_TOKEN=000000000:AAAAAA
          REDIS_HOST=localhost
          REDIS_PORT=6379
          JAVA_API_BASE_URL=http://localhost:8080
          LOG_LEVEL=DEBUG
          CACHE_ENABLED=false
          EOF

      - name: Install dependencies
        run: |
          cd export-worker
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff

      - name: Lint Python (ruff)
        run: |
          cd export-worker
          # Критичные правила: F (pyflakes — unused, undefined), E9 (syntax),
          # W605 (invalid escape). Расширять набор постепенно, не одним махом,
          # чтобы lint не стал noise-gate.
          ruff check --select F,E9,W605 --exclude tests .

      - name: Run Python tests
        run: |
          cd export-worker
          pytest \
            tests/test_models.py \
            tests/test_json_converter.py \
            tests/test_export_worker.py \
            tests/test_message_cache.py \
            tests/test_queue_consumer.py \
            tests/test_pyrogram_client.py \
            tests/test_java_client.py \
            -v --tb=short

  # ─── 2. Сборка и публикация Docker-образа ────────────────────────────────────
  docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: [test, python-tests]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/telegram-export-cleaner
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Java API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract python-worker metadata
        id: python_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/telegram-export-python-worker
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push Python worker
        uses: docker/build-push-action@v6
        with:
          context: ./export-worker
          file: export-worker/Dockerfile
          push: true
          tags: ${{ steps.python_meta.outputs.tags }}
          labels: ${{ steps.python_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 3. Деплой на сервер ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    timeout-minutes: 15
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GH_TOKEN,GH_ACTOR
          script: |
            mkdir -p /root/telegram-cleaner && cd /root/telegram-cleaner
            cat <<EOF > docker-compose.yml
            services:
              java-bot:
                image: ghcr.io/${{ github.repository_owner }}/telegram-export-cleaner:latest
                ports: ["127.0.0.1:8081:8080"]
                # Label для фильтрованного docker prune в CI — чтобы не снести
                # контейнеры SillyTavern и других сервисов на этом же хосте.
                labels:
                  - "project=telegram-cleaner"
                environment:
                  - REDIS_HOST=redis
                  - REDIS_PORT=6379
                  - REDIS_QUEUE_NAME=telegram_export
                  - TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
                  - TELEGRAM_BOT_USERNAME=ExportCleanerBot
                  - JAVA_API_KEY=${{ secrets.JAVA_API_KEY }}
                volumes:
                  - export-data:/data/export
                depends_on: { redis: { condition: service_healthy } }
                restart: unless-stopped
                healthcheck:
                  test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                  start_period: 30s
                # Снижено с 1024M: выровнено с репо-compose. Dockerfile -Xmx640m рассчитан под 768m.
                mem_limit: 768m
              python-worker:
                image: ghcr.io/${{ github.repository_owner }}/telegram-export-python-worker:latest
                labels:
                  - "project=telegram-cleaner"
                environment:
                  # Telegram API
                  - TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}
                  - TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}
                  - TELEGRAM_SESSION_STRING=${{ secrets.TELEGRAM_SESSION_STRING }}
                  - TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
                  # Java Bot API
                  - JAVA_API_BASE_URL=http://java-bot:8080
                  - JAVA_API_KEY=${{ secrets.JAVA_API_KEY }}
                  # Redis
                  - REDIS_HOST=redis
                  - REDIS_PORT=6379
                  - REDIS_DB=0
                  - REDIS_QUEUE_NAME=telegram_export
                  # Worker (подогнано под weak server: 1 core, 3-4GB RAM)
                  - WORKER_NAME=export-worker-prod
                  - MAX_WORKERS=1
                  - JOB_TIMEOUT=1800
                  - MAX_RETRIES=3
                  - RETRY_BASE_DELAY=1.0
                  - RETRY_MAX_DELAY=32.0
                  # SQLite message cache (critical: hdd volume below)
                  - CACHE_DB_PATH=/data/cache/messages.db
                  - CACHE_ENABLED=true
                  - CACHE_MAX_DISK_GB=25
                  # Logging
                  - LOG_LEVEL=INFO
                  - PYTHONUNBUFFERED=1
                volumes:
                  # SQLite кэш сообщений — должен переживать рестарты контейнера.
                  - cache-data:/data/cache
                depends_on: { java-bot: { condition: service_healthy } }
                restart: unless-stopped
                healthcheck:
                  test: ["CMD-SHELL", "pgrep -f 'python.*main.py' || exit 1"]
                  interval: 15s
                  timeout: 5s
                  retries: 3
                  start_period: 10s
                # Увеличено с 512M: выровнено с репо — больше памяти для in-flight батчей и Pyrogram.
                mem_limit: 768m
              redis:
                image: redis:7-alpine
                labels:
                  - "project=telegram-cleaner"
                # noeviction: выбрасывает ошибку при переполнении вместо тихого удаления ключей.
                # allkeys-lru в проде молча выкидывал ключи очереди и ломал экспорты.
                command: redis-server --appendonly yes --appendfsync everysec --maxmemory 128mb --maxmemory-policy noeviction
                volumes:
                  - redis-data:/data
                healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 10s }
                restart: unless-stopped
                mem_limit: 256m
            volumes:
              redis-data:
              export-data:
              cache-data:
            EOF
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans

            # ── Post-deploy smoke test ──────────────────────────────────────
            # Раньше deploy считался успешным, если `compose up -d` вернул 0,
            # даже если java-bot тут же крашился (OOM, битая миграция, bad env).
            # Теперь ждём, пока /api/health ответит 200, иначе job становится
            # красным и команда видит сломанный прод сразу, а не через час по
            # жалобам пользователей.
            echo "⏳ Ждём /api/health (до 90 сек)..."
            HEALTH_OK=""
            for i in $(seq 1 30); do
              if curl -fsS --max-time 3 http://127.0.0.1:8081/api/health >/dev/null 2>&1; then
                HEALTH_OK=1
                echo "✅ java-bot жив после $((i*3)) сек"
                break
              fi
              sleep 3
            done
            if [ -z "$HEALTH_OK" ]; then
              echo "❌ /api/health не отвечает 90 сек — деплой сломан"
              echo "--- docker ps ---"
              docker compose ps
              echo "--- java-bot logs (tail 100) ---"
              docker compose logs --tail=100 java-bot || true
              echo "--- python-worker logs (tail 50) ---"
              docker compose logs --tail=50 python-worker || true
              exit 1
            fi

            # Clean up only our project images (avoid deleting other containers on server).
            # Фильтруем по label=project=telegram-cleaner, чтобы НЕ снести образы
            # SillyTavern и других сервисов, живущих на том же хосте.
            docker image prune --filter "until=24h" --filter "label=project=telegram-cleaner" -f
            docker container prune --filter "until=24h" --filter "label=project=telegram-cleaner" -f
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
