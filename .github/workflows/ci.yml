name: CI

on:
  push:
    branches-ignore: [ main ]

# Отменяем предыдущие запуски для той же ветки — экономим минуты
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Сборка и тесты ──────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # LiquibaseDriftGateTest читает changelog из origin/main через `git show`.
          # depth=1 по умолчанию не подтягивает main в feature/dev-ветках.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn clean package


  # ─── Python тесты (reusable workflow — единый источник истины) ───────────────
  python-tests:
    name: Python Tests
    uses: ./.github/workflows/python-tests.yml

  # ─── Security scans (non-blocking: continue-on-error чтобы не падать
  #     на каждый новый CVE и не блокировать релиз — смотрим в логах) ────────
  security-scan:
    name: Security Scans
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan (high+critical)
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          scan-type: 'fs'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
          format: 'table'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: pip-audit (worker dependencies)
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r export-worker/requirements.txt --strict || true

      - name: Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
