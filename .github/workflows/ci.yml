name: CI

on:
  push:
    branches-ignore: [ main ]

# Отменяем предыдущие запуски для той же ветки — экономим минуты
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Сборка и тесты ──────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn clean package


  # ─── Python тесты (reusable workflow — единый источник истины) ───────────────
  python-tests:
    name: Python Tests
    uses: ./.github/workflows/python-tests.yml
