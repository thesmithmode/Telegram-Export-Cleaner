name: CI

on:
  push:
    branches-ignore: [ main ]

# Отменяем предыдущие запуски для той же ветки — экономим минуты
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Сборка и тесты ──────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # LiquibaseDriftGateTest читает changelog из origin/main через `git show`.
          # depth=1 по умолчанию не подтягивает main в feature/dev-ветках.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn clean package

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7
          if-no-files-found: warn


  # ─── Python тесты (reusable workflow — единый источник истины) ───────────────
  python-tests:
    name: Python Tests
    uses: ./.github/workflows/python-tests.yml

  # ─── Security scans
  # Двухуровневая стратегия: CRITICAL → блокирует merge (jacoco-style gate),
  # HIGH → continue-on-error (информация в логах, не блокирует). Без блокера на
  # CRITICAL прод-уязвимости проскакивали тихо. HIGH часто = transitive deps
  # без fix-версии — не стоит блокировать релиз.
  security-scan:
    name: Security Scans
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Gitleaks scan range BASE^..HEAD. На multi-commit push shallow checkout
          # не подтягивает parent первого коммита push'а → range не строится →
          # CI красный без реальных утечек. fetch-depth: 0 решает.
          fetch-depth: 0

      - name: Trivy filesystem scan (CRITICAL — blocking)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0 (pin SHA — теги без префикса 'v' marketplace не резолвит)
        with:
          scan-type: 'fs'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
          format: 'table'

      - name: Trivy filesystem scan (HIGH — informational)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        continue-on-error: true
        with:
          scan-type: 'fs'
          severity: 'HIGH'
          exit-code: '0'
          ignore-unfixed: true
          format: 'table'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: pip-audit (worker dependencies — informational)
        # pip-audit без severity-фильтра. Все findings в логах, но CI не падает —
        # transitive deps часто без CVE-fixed-versions. Решение об апдейте — оператор.
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r export-worker/requirements.txt --strict || true

      - name: Gitleaks secrets scan (blocking)
        # Утечка секрета = CRITICAL. Любая находка должна резать pipeline.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Java stack smoke test ────────────────────────────────────────────────────
  # Запускает реальный JAR (не mock-контекст) и проверяет HTTP-контракты фильтров.
  # Закрывает gap: unit-тесты с Mockito не могут гарантировать, что фильтры
  # реально зарегистрированы в цепочке и обрабатываются в правильном порядке.
  java-stack-smoke:
    name: Java Stack Smoke
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 5
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR (skip tests)
        run: mvn package -DskipTests -q

      - name: Start JAR in background
        run: |
          JAR_FILE="$(find target -maxdepth 1 -name 'telegram-cleaner-*.jar' \
            ! -name '*.original' \
            ! -name '*-sources.jar' \
            ! -name '*-javadoc.jar' | sort | head -n 1)"
          if [ -z "$JAR_FILE" ]; then
            echo "No runnable JAR found in target/"
            ls -la target || true
            exit 1
          fi

          java -jar "$JAR_FILE" \
            --spring.profiles.active=smoke \
            > /tmp/smoke-app.log 2>&1 &
          echo $! > /tmp/smoke-app.pid

      - name: Wait for /api/health
        run: |
          echo "Waiting for app to start (max 60s)..."
          for i in $(seq 1 20); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 2 \
              http://localhost:8080/api/health 2>/dev/null || echo "FAIL")
            if [ "$CODE" = "200" ]; then
              echo "App started after $((i*3))s"
              exit 0
            fi
            sleep 3
          done
          echo "FAIL: app did not start within 60s"
          cat /tmp/smoke-app.log
          exit 1

      - name: Smoke assertions
        run: |
          API_KEY="smoke-ci-test-key-dev"
          BASE="http://localhost:8080"
          FAIL=0

          check() {
            local label="$1" expected="$2" actual="$3"
            if [ "$actual" = "$expected" ]; then
              echo "PASS [$label]: HTTP $actual"
            else
              echo "FAIL [$label]: expected $expected, got $actual"
              FAIL=1
            fi
          }

          check "health → 200" "200" \
            "$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/health")"

          check "no-key → 401" "401" \
            "$(curl -s -o /dev/null -w "%{http_code}" -X POST "$BASE/api/convert")"

          check "wrong-key → 401" "401" \
            "$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "X-API-Key: totally-wrong-key" "$BASE/api/convert")"

          CORRECT_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "X-API-Key: $API_KEY" "$BASE/api/convert")
          if [ "$CORRECT_CODE" = "401" ]; then
            echo "FAIL [correct-key not 401]: got 401 — ApiKeyFilter rejected valid key"
            FAIL=1
          else
            echo "PASS [correct-key not 401]: HTTP $CORRECT_CODE"
          fi

          IDEM_KEY="smoke-idem-test-key-1234567890"
          curl -s -o /dev/null -X POST \
            -H "X-API-Key: $API_KEY" \
            -H "Idempotency-Key: $IDEM_KEY" \
            "$BASE/api/convert" || true
          check "idempotency duplicate → 409" "409" \
            "$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "X-API-Key: $API_KEY" \
              -H "Idempotency-Key: $IDEM_KEY" \
              "$BASE/api/convert")"

          [ "$FAIL" = "0" ] || exit 1

      - name: Stop JAR
        if: always()
        run: |
          if [ -f /tmp/smoke-app.pid ]; then
            kill "$(cat /tmp/smoke-app.pid)" 2>/dev/null || true
          fi

      - name: Upload smoke log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-app-log
          path: /tmp/smoke-app.log
          retention-days: 3
