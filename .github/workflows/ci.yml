name: CI

on:
  push:
    branches-ignore: [ main ]

jobs:

  # ─── Сборка и тесты ──────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn clean package

  # ─── Python Worker Tests ───────────────────────────────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Create environment file
        run: |
          cat > export-worker/.env << EOF
          TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_PHONE_NUMBER=${{ secrets.TELEGRAM_PHONE_NUMBER }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          JAVA_API_KEY=${{ secrets.JAVA_API_KEY }}
          REDIS_HOST=localhost
          REDIS_PORT=6379
          JAVA_API_BASE_URL=http://localhost:8080
          LOG_LEVEL=DEBUG
          EOF
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_PHONE_NUMBER: ${{ secrets.TELEGRAM_PHONE_NUMBER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          JAVA_API_KEY: ${{ secrets.JAVA_API_KEY }}

      - name: Install dependencies
        run: |
          cd export-worker
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run unit tests
        run: |
          cd export-worker
          pytest tests/test_models.py tests/test_json_converter.py -v --cov=. --cov-report=xml

      - name: Run integration tests
        run: |
          cd export-worker
          pytest tests/test_integration.py -v --tb=short

      - name: Run E2E tests
        run: |
          cd export-worker
          pytest tests/test_end_to_end.py -v --tb=short

      - name: Run performance tests
        run: |
          cd export-worker
          pytest tests/test_performance.py -v --tb=short

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./export-worker/coverage.xml
          fail_ci_if_error: false
