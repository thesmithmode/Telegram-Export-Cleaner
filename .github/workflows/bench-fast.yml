name: bench-fast

on:
  push:
    branches: [fast]

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: export-worker/requirements.txt

      - name: Install deps
        run: |
          pip install -r export-worker/requirements.txt
          pip install psutil

      - name: bench_dashboard
        timeout-minutes: 3
        run: python .codex/autoresearch/bench_dashboard.py | tee .codex/autoresearch/run_dashboard.log

      - name: Summary
        if: always()
        run: |
          echo "## bench results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          for f in .codex/autoresearch/run_*.log; do
            echo "=== $f ===" >> $GITHUB_STEP_SUMMARY
            grep -E "^[a-z_]+:" "$f" >> $GITHUB_STEP_SUMMARY || true
          done
          echo '```' >> $GITHUB_STEP_SUMMARY
