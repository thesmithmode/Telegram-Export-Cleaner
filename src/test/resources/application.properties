# Test application.properties REPLACES (not merges) the main file on the
# classpath during tests — Maven puts target/test-classes before target/classes,
# Spring Boot's config data loader takes the first match and stops.
# Therefore every property Spring context needs at startup must live here too.

# -----------------------------------------------------------------------------
# Core Spring / async
# -----------------------------------------------------------------------------
server.port=8080
spring.mvc.async.request-timeout=-1

# -----------------------------------------------------------------------------
# Redis (defaults for tests — overridden by embedded-redis TestConfiguration)
# -----------------------------------------------------------------------------
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# -----------------------------------------------------------------------------
# Telegram Bot (defaults — не отправляем реальные запросы в тестах)
# -----------------------------------------------------------------------------
# Пустой token заставляет telegrambots-starter пропустить регистрацию long-polling
# бота — иначе он ходит в api.telegram.org и ловит 404 при старте контекста.
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:TestExportCleanerBot}
telegram.queue.name=${REDIS_QUEUE_NAME:telegram_export_test}

# Dashboard Mini App URL — публичный HTTPS, чтобы пройти валидацию в ExportBot.
dashboard.mini-app.url=https://test.example.com/dashboard/mini-app

# -----------------------------------------------------------------------------
# Dashboard storage: in-memory SQLite + Liquibase.
# maximum-pool-size=1 keeps Hikari on a single connection — otherwise each
# new connection would attach to a fresh ":memory:" database, and Liquibase
# would migrate one while tests read another.
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:sqlite::memory:?date_class=text
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys=ON;

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Без этого Spring Boot ищет changelog по умолчанию в .yaml,
# а не в нашем .sql — запуск падает на старте контекста.
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.sql

# Выключаем StreamMessageListenerContainer в тестах — Redis в CI не гарантирован,
# а фоновый poll-loop без подключения спамит ошибками. Publisher/Consumer
# тестируем отдельно с моками (StatsStreamPublisherTest / StatsStreamConsumerTest).
dashboard.stats.stream.enabled=false

# Dashboard auth (Telegram Login)
dashboard.auth.bootstrap.enabled=false
dashboard.auth.admin.telegram-id=999

# ApiKeyFilter fail-fast требует непустой api.key. В тестах — фиксированное значение.
api.key=test-api-key
