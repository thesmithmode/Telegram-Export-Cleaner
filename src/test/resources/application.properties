# Test overrides — applied to every @SpringBootTest because Spring Boot
# merges src/test/resources/application.properties on top of the main one.

# -----------------------------------------------------------------------------
# Dashboard storage: in-memory SQLite.
# maximum-pool-size=1 keeps Hikari on a single connection — otherwise each
# new connection would attach to a fresh ":memory:" database, and Flyway
# would migrate one while tests read another.
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:sqlite::memory:
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys=ON;
