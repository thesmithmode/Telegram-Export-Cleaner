# Test overrides — src/test/resources/application.properties REPLACES the
# main file on the classpath during tests (test resources come first), so
# every property we rely on has to be declared here too, not just in main.

# -----------------------------------------------------------------------------
# Dashboard storage: in-memory SQLite.
# maximum-pool-size=1 keeps Hikari on a single connection — otherwise each
# new connection would attach to a fresh ":memory:" database, and Liquibase
# would migrate one while tests read another.
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:sqlite::memory:
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys=ON;

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Без этого Spring Boot ищет changelog по умолчанию в .yaml,
# а не в нашем .sql — запуск падает на старте контекста.
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.sql
