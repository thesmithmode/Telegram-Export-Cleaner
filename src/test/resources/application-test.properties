# Тестовые пути — изолированы от основных, чтобы тесты не конфликтовали
# с запущенным приложением на той же машине.
app.storage.import-path=${java.io.tmpdir}/tcleaner-test/import
app.storage.export-path=${java.io.tmpdir}/tcleaner-test/export

# Подавляем INFO-логи в тестах
logging.level.com.tcleaner=WARN

# Redis: тесты с полным контекстом используют Testcontainers
# и переопределяют хост/порт через DynamicPropertySource.
# Для остальных тестов автоконфигурация Redis отключена:
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ApiKeyFilter fail-fast требует непустой api.key. В тестах — фиксированное значение.
api.key=test-api-key
