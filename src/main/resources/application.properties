server.port=8080

# Tomcat request timeout (ms)
server.tomcat.connection-timeout=30000

# Compression
server.compression.enabled=true
server.compression.mime-types=text/plain,application/json

# Storage configuration
# Пути /data/import и /data/export рассчитаны на Docker (см. docker-compose.yml)
app.storage.import-path=/data/import
app.storage.export-path=/data/export
app.storage.export-ttl-minutes=10
app.storage.cleanup-interval-ms=60000

# Multipart file upload limits
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Telegram Bot
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:ExportCleanerBot}
telegram.queue.name=${REDIS_QUEUE_NAME:telegram_export}

# CORS configuration
# По умолчанию разрешены localhost origins для разработки
# В production установите реальные domains: app.cors.allowed-origins=https://yourdomain.com
app.cors.allowed-origins=http://localhost:3000,http://localhost:8081
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=Content-Type,Authorization,X-Requested-With
app.cors.max-age=3600

# Async processing pool
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=50

# Logging
logging.level.com.tcleaner=INFO
