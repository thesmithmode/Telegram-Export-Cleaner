server.port=8080

# Tomcat request timeout (ms) - default 5 minutes
server.tomcat.connection-timeout=${SERVER_CONNECTION_TIMEOUT_MS:300000}
# DoS hardening: do not allow unlimited swallowed data
server.tomcat.max-swallow-size=${SERVER_MAX_SWALLOW_SIZE:536870912}

# Async request timeout (ms). Keep finite in production.
spring.mvc.async.request-timeout=${SPRING_ASYNC_REQUEST_TIMEOUT_MS:900000}

# Compression
server.compression.enabled=true
server.compression.mime-types=text/plain,application/json

# Multipart file upload limits (O(1) Memory strategy)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_SIZE:512MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_SIZE:512MB}
# Threshold 1MB: Anything larger than 1MB goes to disk immediately, not RAM
spring.servlet.multipart.file-size-threshold=1MB
# Use the Docker volume for temporary files
spring.servlet.multipart.location=/data/import

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Telegram Bot
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:ExportCleanerBot}
telegram.queue.name=${REDIS_QUEUE_NAME:telegram_export}
