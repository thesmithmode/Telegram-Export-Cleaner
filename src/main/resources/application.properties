server.port=8080

# Tomcat request timeout (ms)
server.tomcat.connection-timeout=30000

# Compression
server.compression.enabled=true
server.compression.mime-types=text/plain,application/json

# Multipart file upload limits (для POST /api/convert)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# API security
api.key=${JAVA_API_KEY:}

# Telegram Bot
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:ExportCleanerBot}
telegram.queue.name=${REDIS_QUEUE_NAME:telegram_export}

# Logging
# Уровни задаются через LOG_LEVEL env variable (logback.xml)
