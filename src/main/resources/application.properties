server.port=8080

# Tomcat request timeout (ms) - 10 minutes
server.tomcat.connection-timeout=600000
server.tomcat.max-swallow-size=-1

# Async request timeout (Important for StreamingResponseBody)
# -1 means no timeout, but we also set up a custom TaskExecutor in WebConfig
spring.mvc.async.request-timeout=-1

# Compression
server.compression.enabled=true
server.compression.mime-types=text/plain,application/json

# Multipart file upload limits (O(1) Memory strategy)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2048MB
spring.servlet.multipart.max-request-size=2048MB
# Threshold 1MB: Anything larger than 1MB goes to disk immediately, not RAM
spring.servlet.multipart.file-size-threshold=1MB
# Use the Docker volume for temporary files
spring.servlet.multipart.location=/data/import

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Telegram Bot
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:ExportCleanerBot}
telegram.queue.name=${REDIS_QUEUE_NAME:telegram_export}

# Внутренний API ключ для /api/** (кроме /api/health). Обязателен — без него
# ApiKeyFilter бросает IllegalStateException и Spring Boot падает на старте.
api.key=${JAVA_API_KEY:}

# =============================================================================
# Dashboard storage (SQLite + Hibernate + Liquibase)
# =============================================================================
# WAL mode + foreign_keys are enabled per-connection via Hikari init SQL.
# DDL is owned by Liquibase (changelog in db/changelog); Hibernate validates only.
# Liquibase is used instead of Flyway because SQLite support was removed from
# OSS Flyway 10+ (moved to the commercial flyway-database-sqlite module).
# date_class=text forces xerial sqlite-jdbc to round-trip java.sql.Timestamp
# through ISO-8601 TEXT (yyyy-MM-dd HH:mm:ss.SSS) — required because the
# Liquibase schema (db.changelog-master.sql) declares all timestamp columns as
# TEXT and inserts defaults via CURRENT_TIMESTAMP (which is stored as text).
# Without this, JDBC's default date_class=INTEGER tries to parse the stored
# text back as epoch millis and fails with "Error parsing time stamp".
spring.datasource.url=jdbc:sqlite:${DASHBOARD_DB_PATH:./dashboard.db}?date_class=text
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-init-sql=PRAGMA journal_mode=WAL; PRAGMA foreign_keys=ON;

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# DDL владеет Liquibase. validate мы не используем: SQLite хранит типы с affinity
# (TEXT ≈ VARCHAR ≈ CLOB), Hibernate шлёт VARCHAR-ожидания и падает на false-positive
# несоответствиях. none — Hibernate просто мапит сущности на уже существующие таблицы.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.sql

# =============================================================================
# Redis Stream stats:events — event-bus для ingestion-событий дашборда.
# См. docs/DASHBOARD.md §"Сбор данных".
# =============================================================================
dashboard.stats.stream.key=${STATS_STREAM_KEY:stats:events}
dashboard.stats.stream.group=${STATS_STREAM_GROUP:dashboard-writer}
dashboard.stats.stream.consumer=${STATS_STREAM_CONSUMER:java-bot-1}
dashboard.stats.stream.maxlen=${STATS_STREAM_MAXLEN:100000}
dashboard.stats.stream.enabled=${STATS_STREAM_ENABLED:true}

# =============================================================================
# Dashboard auth (Telegram Login Widget)
# bootstrap.enabled=true создаёт/обновляет ADMIN-запись по admin.telegram-id при старте.
# Сессия — 30 дней неактивности.
# =============================================================================
dashboard.auth.bootstrap.enabled=${DASHBOARD_ENABLE_BOOTSTRAP:false}
dashboard.auth.admin.telegram-id=${DASHBOARD_ADMIN_TG_ID:0}
server.servlet.session.timeout=30d

# Session cookie: HttpOnly + SameSite=Lax. Secure-флаг выставляется автоматически
# по X-Forwarded-Proto=https (см. forward-headers-strategy выше) — не хардкодим true,
# чтобы не ломать локальный HTTP-dev.
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# =============================================================================
# Dashboard i18n / Thymeleaf
# =============================================================================
# messages.properties — дефолтная русская локаль дашборда (primary).
# Будущие переводы — messages_en.properties и т.п. без изменения шаблонов.
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# Thymeleaf
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# =============================================================================
# Reverse-proxy / HTTPS (Traefik)
# =============================================================================
# Позволяет Spring читать X-Forwarded-Proto, X-Forwarded-Host и X-Real-IP
# от Traefik и корректно строить redirect-URL (https://...) и Secure-cookie.
# В итоге: JSESSIONID получает Secure + SameSite=Lax + HttpOnly автоматически
# при наличии X-Forwarded-Proto=https в запросе.
server.forward-headers-strategy=NATIVE

dashboard.mini-app.url=https://${TRAEFIK_DASHBOARD_DOMAIN:localhost:8080}/dashboard/mini-app
