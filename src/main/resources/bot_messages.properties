# Default bot strings (English). Used as universal fallback when a key is missing
# in a specific locale. File encoding: UTF-8 (Spring Boot 3.x default for
# ReloadableResourceBundleMessageSource configured in BotI18nConfig).

# ---- Slash commands (shown in Telegram clients) ----
bot.command.start=Start the bot and show help
bot.command.cancel=Cancel the active export
bot.command.settings=Settings (language and more)

# ---- Language selection ----
bot.start.choose_language=🌐 Please choose your language.
bot.start.language_saved=✅ Language set: {0}
bot.settings.title=⚙️ Settings
bot.settings.change_language=🌐 Change language

# ---- /start help ----
bot.start.help=This bot exports a Telegram chat history and sends you the cleaned-up text.\n\nSend one of:\n• username: @durov\n• link: https://t.me/durov\n\nCommands: /cancel (cancel the active export), /settings (settings)

# ---- Prompts (date range) ----
bot.prompt.from_date=\n\nEnter the start date in the format dd.mm.yyyy\nExample: 01.01.2024
bot.prompt.to_date=\n\nEnter the end date in the format dd.mm.yyyy\nExample: 31.12.2025
bot.prompt.to_date_inline= (dd.mm.yyyy):
bot.prompt.choose_range=📋 Chat: {0}\n\nChoose an export range:
bot.prompt.choose_range_short=📋 Chat: {0}\nChoose a range:
bot.prompt.from_range_header=📅 Chat: {0}
bot.prompt.from_start_line=\nFrom: chat beginning
bot.prompt.from_date_set=📅 From: {0}\n\nEnter the end date

# ---- Date info (inside "task accepted" block) ----
bot.date.prefix=\n📅
bot.date.from=From: {0}
bot.date.from_chat_start=From: chat beginning
bot.date.to= — To: {0}
bot.date.to_today= — To: today

# ---- Errors ----
bot.error.invalid_format=❌ Invalid format. Send a link (https://t.me/channel) or @username.
bot.error.invalid_date_format=❌ Invalid format (dd.mm.yyyy)
bot.error.session_expired=❌ Session expired. Send a @username or chat link again.
bot.error.active_export_exists=⏳ You already have an active export. Wait for it to finish or send /cancel
bot.error.active_export_exists_id=⏳ You already have an active export ({0}).\nWait for it to finish or send /cancel
bot.error.queue_fail=❌ Something went wrong while queuing the task. Try again later.
bot.error.internal=❌ Internal error. Please try again.
bot.error.language_save_failed=❌ Could not save language. Try again later.

# ---- Cancel ----
bot.cancel.no_active=❌ No active export.
bot.cancel.ok=✅ Export {0} cancelled.
bot.cancel.ok_simple=✅ Export cancelled.

# ---- Queue / task acceptance ----
bot.task.accepted=⏳ Task accepted!\n\nID: {0}\nChat: {1}{2}{3}
bot.queue.cached=\n\n⚡ Data is cached — result will be fast!
bot.queue.starting=\n\n⚙️ Task is being processed, please wait...
bot.queue.position=\n\n📋 You are in queue: position {0}\n{1} task(s) ahead

# ---- Inline buttons ----
bot.button.export_all=📦 Entire chat
bot.button.last_24h=⏱ 24 hours
bot.button.last_3d=🗓 3 days
bot.button.last_7d=🗓 7 days
bot.button.last_30d=🗓 30 days
bot.button.date_range=📅 Specify date range
bot.button.back=◀️ Back
bot.button.from_start=⏮ From chat start
bot.button.to_today=⏭ Until today
bot.button.cancel_export=❌ Cancel export

# Subscription confirmation (weekly confirm prompt)
bot.button.sub_confirm=Yes, keep it active
bot.sub.confirm.request=Your subscription is still active. Please confirm within 48 hours that you want to keep receiving periodic exports, otherwise it will be archived.
bot.sub.confirm.ok=Subscription confirmed — it will continue running.
bot.sub.confirm.not_found=Subscription not found or already archived.
bot.sub.confirm.invalid=Invalid confirmation request.
bot.sub.empty=Subscription iteration for {0} completed. No new messages in window {1} → {2}.
bot.sub.failure=Subscription iteration failed: {0}. Two consecutive failures will pause the subscription.
bot.sub.paused=Your subscription has been paused after two consecutive failures. Open the dashboard to resume.
bot.sub.archived=Your subscription has been archived (no confirmation within 48 hours). Create a new one in the dashboard if needed.
