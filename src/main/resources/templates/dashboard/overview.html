<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{dashboard/layout :: layout(title=#{overview.title}, content=~{::overview-content})}">
<body>

<!--
  Overview-страница дашборда. SSR рендерит каркас (KPI, period-filter, canvas'ы,
  заголовки таблиц). Данные подтягиваются js/pages/overview.js через JSON API
  /dashboard/api/stats/overview + /timeseries.
-->
<div th:fragment="overview-content" class="overview">
    <h1 th:text="#{overview.heading}">Обзор</h1>

    <div th:replace="~{dashboard/fragments/period-filter :: period-filter}"></div>

    <div class="kpi-grid">
        <div class="kpi" id="kpi-exports">
            <div class="kpi__label" th:text="#{overview.kpi.exports}">Экспортов</div>
            <div class="kpi__delta" data-kpi-delta="exports"></div>
            <div class="kpi__value" data-kpi="totalExports">—</div>
            <svg class="kpi__spark" data-kpi-spark="exports" viewBox="0 0 60 22" preserveAspectRatio="none"></svg>
            <div class="kpi__meta" data-kpi-meta="exports"></div>
        </div>
        <div class="kpi info" id="kpi-messages">
            <div class="kpi__label" th:text="#{overview.kpi.messages}">Сообщений</div>
            <div class="kpi__delta" data-kpi-delta="messages"></div>
            <div class="kpi__value" data-kpi="totalMessages">—</div>
            <svg class="kpi__spark" data-kpi-spark="messages" viewBox="0 0 60 22" preserveAspectRatio="none"></svg>
            <div class="kpi__meta" data-kpi-meta="messages"></div>
        </div>
        <div class="kpi warn" id="kpi-bytes">
            <div class="kpi__label" th:text="#{overview.kpi.bytes}">Объём</div>
            <div class="kpi__delta" data-kpi-delta="bytes"></div>
            <div class="kpi__value" data-kpi="totalBytes">—</div>
            <svg class="kpi__spark" data-kpi-spark="bytes" viewBox="0 0 60 22" preserveAspectRatio="none"></svg>
            <div class="kpi__meta" data-kpi-meta="bytes"></div>
        </div>
        <div class="kpi ok" id="kpi-users">
            <div class="kpi__label" th:text="#{overview.kpi.users}">Пользователей</div>
            <div class="kpi__delta" data-kpi-delta="users"></div>
            <div class="kpi__value" data-kpi="totalUsers">—</div>
            <svg class="kpi__spark" data-kpi-spark="users" viewBox="0 0 60 22" preserveAspectRatio="none"></svg>
            <div class="kpi__meta" data-kpi-meta="users"></div>
        </div>
    </div>

    <div th:replace="~{dashboard/fragments/chart-block :: chart(
            id='chart-timeseries', title=#{overview.chart.timeseries}, height=260)}"></div>

    <div th:replace="~{dashboard/fragments/chart-block :: chart(
            id='chart-status', title=#{overview.chart.status}, height=240)}"></div>

    <div th:replace="~{dashboard/fragments/chart-block :: chart(
            id='chart-users', title=#{overview.chart.activeUsers}, height=220)}"></div>

    <div th:replace="~{dashboard/fragments/chart-block :: chart(
            id='chart-top-users', title=#{overview.chart.topUsers}, height=260)}"></div>

    <div th:replace="~{dashboard/fragments/chart-block :: chart(
            id='chart-top-chats', title=#{overview.chart.topChats}, height=260)}"></div>

    <!-- Кэш сервера (только на ADMIN-странице, URL-guard в security config) -->
    <section class="cache-panel" id="cache-panel" aria-labelledby="cache-panel-heading">
        <h2 id="cache-panel-heading">Кэш сервера</h2>
        <div class="cache-panel__status" data-cache-status hidden>
            <em data-cache-status-msg>Снапшот ещё не опубликован worker'ом.</em>
        </div>
        <div class="cache-panel__kpis">
            <div class="kpi" id="kpi-cache-usage">
                <div class="kpi__label">Использовано</div>
                <div class="kpi__value" data-cache-kpi="usage">—</div>
                <div class="kpi__meta" data-cache-kpi-meta="usage"></div>
                <div class="progress" role="progressbar"
                     aria-label="Заполненность кэша"
                     aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
                     data-cache-progress>
                    <div class="progress__bar" data-cache-bar></div>
                </div>
            </div>
            <div class="kpi info" id="kpi-cache-chats">
                <div class="kpi__label">Чатов в кэше</div>
                <div class="kpi__value" data-cache-kpi="chats">—</div>
            </div>
            <div class="kpi info" id="kpi-cache-messages">
                <div class="kpi__label">Сообщений всего</div>
                <div class="kpi__value" data-cache-kpi="messages">—</div>
            </div>
            <div class="kpi warn" id="kpi-cache-generated">
                <div class="kpi__label">Обновлено</div>
                <div class="kpi__value" data-cache-kpi="generated">—</div>
            </div>
        </div>
        <div class="cache-panel__charts">
            <div th:replace="~{dashboard/fragments/chart-block :: chart(
                    id='chart-cache-heatmap', title='LRU-температура', height=220)}"></div>
            <div th:replace="~{dashboard/fragments/chart-block :: chart(
                    id='chart-cache-types', title='Сегментация по типу чата', height=220)}"></div>
        </div>
        <div class="cache-panel__table">
            <h3>Топ чатов по размеру</h3>
            <table class="table" id="table-cache-top" data-cache-top>
                <thead>
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col" data-sort-key="chat" data-sort-type="string">Чат</th>
                        <th scope="col" data-sort-key="chatType" data-sort-type="string">Тип</th>
                        <th scope="col" data-sort-key="msgCount" data-sort-type="number">Сообщений</th>
                        <th scope="col" data-sort-key="sizeBytes" data-sort-type="number">Размер</th>
                        <th scope="col" data-sort-key="pct" data-sort-type="number">% кэша</th>
                        <th scope="col" data-sort-key="lastAccessed" data-sort-type="number">Last access</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <script th:src="@{/dashboard/js/pages/overview.js}" defer></script>
</div>

</body>
</html>
