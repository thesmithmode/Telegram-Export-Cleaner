<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<header th:fragment="header" class="dashboard-header">
    <div class="dashboard-header__brand">
        <a th:href="@{/dashboard}" class="dashboard-header__title"
           th:text="#{app.title}">Telegram Export Cleaner</a>
    </div>

    <nav class="dashboard-nav" sec:authorize="isAuthenticated()">
        <!-- USER видит только одну ссылку на свой кабинет -->
        <a sec:authorize="hasRole('USER')" th:href="@{/dashboard/me}">My Dashboard</a>

        <!-- Admin-табы скрыты от USER под sec:authorize — defence-in-depth
             вдобавок к URL-guard в DashboardSecurityConfig. -->
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/dashboard/overview}"
           th:text="#{nav.overview}">Overview</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/dashboard/users}"
           th:text="#{nav.users}">Users</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/dashboard/chats}"
           th:text="#{nav.chats}">Chats</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/dashboard/events}"
           th:text="#{nav.events}">Events</a>
    </nav>

    <div class="dashboard-header__user" sec:authorize="isAuthenticated()">
        <span class="dashboard-header__username" sec:authentication="name">user</span>
        <form th:action="@{/dashboard/logout}" method="post" class="dashboard-header__logout">
            <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}">
            <button type="submit">Sign out</button>
        </form>
    </div>
</header>

</body>
</html>
