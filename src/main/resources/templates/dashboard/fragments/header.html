<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<header th:fragment="header" class="dashboard-header">
    <div class="dashboard-header__brand">
        <a th:href="@{/dashboard/overview}" class="dashboard-header__title"
           th:text="#{app.title}">Telegram Export Cleaner</a>
    </div>

    <nav class="dashboard-nav" sec:authorize="isAuthenticated()">
        <a th:href="@{/dashboard/overview}" th:text="#{nav.overview}">Overview</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/dashboard/users}"
           th:text="#{nav.users}">Users</a>
        <a th:href="@{/dashboard/chats}" th:text="#{nav.chats}">Chats</a>
        <a th:href="@{/dashboard/events}" th:text="#{nav.events}">Events</a>
    </nav>

    <div class="dashboard-header__user" sec:authorize="isAuthenticated()">
        <span class="dashboard-header__username" sec:authentication="name">user</span>
        <form th:action="@{/dashboard/logout}" method="post" class="dashboard-header__logout">
            <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}">
            <button type="submit" th:text="#{nav.logout}">Logout</button>
        </form>
    </div>
</header>

</body>
</html>
