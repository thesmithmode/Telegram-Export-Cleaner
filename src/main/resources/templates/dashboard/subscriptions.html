<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{dashboard/layout :: layout(title=#{dashboard.subscriptions.title}, content=~{::subscriptions-content})}">
<body>

<!--
  Страница управления подписками /dashboard/subscriptions.
  SSR рендерит структуру (форма, заголовки таблицы, баннер о МСК).
  Данные загружаются через subscriptions.js из /dashboard/api/subscriptions.
  USER видит форму создания подписки, ADMIN — только таблицу.
-->
<div th:fragment="subscriptions-content" class="subscriptions-page"
     th:attr="data-role=${role}, data-user-bot-id=${userBotId}">

    <h1 th:text="#{dashboard.subscriptions.title}">Подписки</h1>

    <!-- Информационный баннер о часовом поясе -->
    <div class="info-banner info-banner--note" role="note">
        <span th:text="#{dashboard.subscriptions.tz_note}">Все времена указаны в МСК (UTC+3).</span>
    </div>

    <!-- Форма создания подписки — только для USER -->
    <section th:if="${role == 'USER'}" class="form-block" id="create-subscription-block">
        <h2 th:text="#{dashboard.subscriptions.form.heading}">Создать подписку</h2>
        <form id="create-subscription-form" class="subscription-form" novalidate>
            <div class="form-row">
                <label for="sub-chat-id" th:text="#{dashboard.subscriptions.form.chat}">Чат</label>
                <input type="text" id="sub-chat-id" name="chatIdentifier"
                       th:placeholder="#{dashboard.subscriptions.form.chat_placeholder}"
                       required>
                <small class="form-hint" th:text="#{dashboard.subscriptions.form.chat.hint}">@username, ссылка t.me или числовой ID</small>
            </div>

            <div class="form-row">
                <fieldset class="period-fieldset">
                    <legend th:text="#{dashboard.subscriptions.form.period}">Период</legend>
                    <label class="radio-label">
                        <input type="radio" name="periodHours" value="24" required>
                        <span th:text="#{dashboard.subscriptions.period.1d}">Каждый день</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="periodHours" value="48">
                        <span th:text="#{dashboard.subscriptions.period.2d}">Каждые 2 дня</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="periodHours" value="72">
                        <span th:text="#{dashboard.subscriptions.period.3d}">Каждые 3 дня</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="periodHours" value="168">
                        <span th:text="#{dashboard.subscriptions.period.7d}">Раз в неделю</span>
                    </label>
                </fieldset>
            </div>

            <div class="form-row">
                <label for="sub-time-msk" th:text="#{dashboard.subscriptions.form.time}">Желаемое время</label>
                <input type="time" id="sub-time-msk" name="desiredTimeMsk"
                       value="09:00" required>
                <small class="form-hint" th:text="#{dashboard.subscriptions.form.time.hint}">Укажите время по МСК (UTC+3). Например, 09:00 МСК = 06:00 UTC</small>
            </div>

            <div class="form-row">
                <label for="sub-since" th:text="#{dashboard.subscriptions.form.since}">Начать с</label>
                <input type="datetime-local" id="sub-since" name="sinceDate">
                <small class="form-hint" th:text="#{dashboard.subscriptions.form.since.hint}">Оставьте пустым — отсчёт начнётся с момента создания</small>
            </div>

            <div class="form-row form-row--actions">
                <button type="submit" class="btn btn--primary"
                        th:text="#{dashboard.subscriptions.form.submit}">Создать подписку</button>
                <span class="form-error" id="create-error" hidden></span>
            </div>
        </form>
    </section>

    <!-- Таблица подписок -->
    <section class="table-block" id="subscriptions-table-block">
        <div class="section-header">
            <h2 th:text="#{dashboard.subscriptions.title}">Подписки</h2>
            <span class="count-badge" data-count-target="subscriptions"></span>
        </div>
        <div class="table-wrap">
            <table class="data-table" id="subscriptions-table">
                <thead>
                <tr>
                    <th th:text="#{dashboard.subscriptions.table.chat}">Чат</th>
                    <th th:text="#{dashboard.subscriptions.table.period}">Период</th>
                    <th th:text="#{dashboard.subscriptions.table.time}">Время МСК</th>
                    <th th:text="#{dashboard.subscriptions.table.since}">С даты</th>
                    <th th:text="#{dashboard.subscriptions.table.status}">Статус</th>
                    <th th:text="#{dashboard.subscriptions.table.next_run}">Следующий запуск</th>
                    <th th:text="#{dashboard.subscriptions.table.actions}">Действия</th>
                </tr>
                </thead>
                <tbody id="subscriptions-body">
                <tr>
                    <td colspan="7">—</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <!-- i18n-строки для JS (data-атрибуты, не видны пользователю) -->
    <div id="subs-i18n" hidden
         th:attr="data-empty=#{dashboard.subscriptions.empty},
                  data-conflict=#{dashboard.subscriptions.error.conflict},
                  data-first-run=#{dashboard.subscriptions.next_run.first},
                  data-status-active=#{dashboard.subscriptions.status.ACTIVE},
                  data-status-paused=#{dashboard.subscriptions.status.PAUSED},
                  data-status-archived=#{dashboard.subscriptions.status.ARCHIVED},
                  data-action-pause=#{dashboard.subscriptions.action.pause},
                  data-action-resume=#{dashboard.subscriptions.action.resume},
                  data-action-delete=#{dashboard.subscriptions.action.delete},
                  data-period-1d=#{dashboard.subscriptions.period.1d},
                  data-period-2d=#{dashboard.subscriptions.period.2d},
                  data-period-3d=#{dashboard.subscriptions.period.3d},
                  data-period-7d=#{dashboard.subscriptions.period.7d}">
    </div>

    <script th:src="@{/dashboard/js/pages/subscriptions.js}" defer></script>
</div>

</body>
</html>
