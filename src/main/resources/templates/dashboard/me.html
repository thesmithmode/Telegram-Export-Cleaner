<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{dashboard/layout :: layout(title=#{me.title}, content=~{::me-content})}">
<body>

<!--
  Персональный дашборд. Скоуп = principal.botUserId (внутри /api/me/**).
  Если у пользователя ещё нет записи в bot_users (свежий логин), JS получит
  пустые DTO, а верх страницы покажет empty-state баннер.
-->
<div th:fragment="me-content" class="user-detail"
     th:attr="data-has-bot-user-id=${hasBotUserId},
              data-empty-chats=#{me.chats.empty},
              data-empty-events=#{me.events.empty}">
    <h1 th:text="#{me.heading}">My Dashboard</h1>

    <div th:if="${!hasBotUserId}" class="empty-state" role="status">
        <span th:text="#{me.empty_state.prefix}">No exports yet. Run</span>
        <code>/export</code>
        <span th:text="#{me.empty_state.suffix}">in the bot to get started.</span>
    </div>

    <div th:replace="~{dashboard/fragments/period-filter :: period-filter}"></div>

    <div class="kpi-grid">
        <div class="kpi" id="kpi-exports">
            <div class="kpi__label" th:text="#{overview.kpi.exports}">Exports</div>
            <div class="kpi__delta" data-kpi-delta="exports"></div>
            <div class="kpi__value" data-kpi="totalExports">—</div>
            <svg class="kpi__spark" data-kpi-spark="exports" viewBox="0 0 60 22" preserveAspectRatio="none"></svg>
            <div class="kpi__meta" data-kpi-meta="exports"></div>
        </div>
        <div class="kpi info" id="kpi-messages">
            <div class="kpi__label" th:text="#{overview.kpi.messages}">Messages</div>
            <div class="kpi__delta" data-kpi-delta="messages"></div>
            <div class="kpi__value" data-kpi="totalMessages">—</div>
            <svg class="kpi__spark" data-kpi-spark="messages" viewBox="0 0 60 22" preserveAspectRatio="none"></svg>
            <div class="kpi__meta" data-kpi-meta="messages"></div>
        </div>
        <div class="kpi warn" id="kpi-bytes">
            <div class="kpi__label" th:text="#{overview.kpi.bytes}">Bytes</div>
            <div class="kpi__delta" data-kpi-delta="bytes"></div>
            <div class="kpi__value" data-kpi="totalBytes">—</div>
            <svg class="kpi__spark" data-kpi-spark="bytes" viewBox="0 0 60 22" preserveAspectRatio="none"></svg>
            <div class="kpi__meta" data-kpi-meta="bytes"></div>
        </div>
    </div>

    <div th:replace="~{dashboard/fragments/chart-block :: chart(
            id='chart-timeseries', title=#{overview.chart.timeseries}, height=260)}"></div>

    <div th:replace="~{dashboard/fragments/chart-block :: chart(
            id='chart-status', title=#{overview.chart.status}, height=260)}"></div>

    <section class="table-block">
        <div class="section-header">
            <h2 th:text="#{me.chats.heading}">My Chats</h2>
            <span class="count-badge" data-count-target="my-chats"></span>
        </div>
        <div class="table-wrap">
            <table class="data-table">
                <thead>
                <tr>
                    <th data-sort-key="chat" data-sort-type="string" th:text="#{chats.col.chat}">Chat</th>
                    <th data-sort-key="exportCount" data-sort-type="number" th:text="#{chats.col.exports}">Exports</th>
                    <th data-sort-key="totalMessages" data-sort-type="number" th:text="#{chats.col.messages}">Messages</th>
                    <th data-sort-key="totalBytes" data-sort-type="number" th:text="#{chats.col.bytes}">Bytes</th>
                </tr>
                </thead>
                <tbody id="my-chats-body">
                <tr><td colspan="4">—</td></tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="table-block">
        <div class="section-header">
            <h2 th:text="#{me.events.heading}">My Recent Events</h2>
            <span class="count-badge" data-count-target="my-events"></span>
        </div>
        <div class="table-wrap">
            <table class="data-table">
                <thead>
                <tr>
                    <th data-sort-key="startedAt" data-sort-type="date" th:text="#{events.col.started}">Started</th>
                    <th data-sort-key="chat" data-sort-type="string" th:text="#{events.col.chat}">Chat</th>
                    <th data-sort-key="status" data-sort-type="string" th:text="#{events.col.status}">Status</th>
                    <th data-sort-key="messagesCount" data-sort-type="number" th:text="#{events.col.messages}">Messages</th>
                </tr>
                </thead>
                <tbody id="my-events-body">
                <tr><td colspan="4">—</td></tr>
                </tbody>
            </table>
        </div>
    </section>

    <script th:src="@{/dashboard/js/pages/me.js}" defer></script>
</div>

</body>
</html>
