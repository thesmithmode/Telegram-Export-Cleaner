<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf?.token}">
    <meta name="_csrf_header" th:content="${_csrf?.headerName}">
    <title th:text="${title} ?: #{app.title}">Dashboard</title>
    <link rel="stylesheet" th:href="@{/dashboard/css/app.css}">
    <!-- defer в <head> гарантирует что app.js выполнится до page-specific скриптов из <main> -->
    <script th:src="@{/dashboard/vendor/chart.min.js}" defer></script>
    <script th:src="@{/dashboard/js/app.js}" defer></script>
</head>
<body>
<header th:replace="~{dashboard/fragments/header :: header}"></header>

<main class="dashboard-main">
    <div th:replace="${content}"></div>
</main>

<footer class="dashboard-footer">
    <small th:text="#{app.footer}">Telegram Export Cleaner — dashboard</small>
</footer>
</body>
</html>
