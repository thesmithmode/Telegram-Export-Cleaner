<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — Dashboard</title>
    <link rel="stylesheet" th:href="@{/dashboard/css/app.css}">
</head>
<body class="login-body">
<main class="login-wrap">
    <div class="login-form">
        <div class="login-form__brand">
            <img th:src="@{/dashboard/img/logo-mark.svg}" alt=""
                 class="login-form__logo" width="48" height="48">
            <h1 class="login-form__title">Telegram Export Cleaner</h1>
            <p class="login-form__subtitle">Sign in with your Telegram account</p>
        </div>

        <div th:if="${param.error != null and param.error[0] == 'invalid'}"
             class="login-form__error">
            Sign-in verification failed. Please try again.
        </div>
        <div th:if="${param.logout != null}" class="login-form__notice">
            You have been signed out.
        </div>

        <div class="login-form__widget">
            <p style="text-align:center;margin-bottom:16px;color:#555;font-size:15px;line-height:1.5">
                Дашборд доступен только через Telegram.<br>
                Откройте бота и нажмите кнопку <strong>Dashboard</strong>.
            </p>
            <a th:href="'https://t.me/' + ${botUsername}"
               target="_blank"
               style="display:block;text-align:center;padding:11px 20px;background:#0088cc;color:#fff;border-radius:6px;text-decoration:none;font-size:15px;font-weight:500">
                Открыть в Telegram
            </a>
        </div>
    </div>
</main>
</body>
</html>
