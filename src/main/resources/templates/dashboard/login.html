<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — Dashboard</title>
    <link rel="stylesheet" th:href="@{/dashboard/css/app.css}">
</head>
<body class="login-body">
<main class="login-wrap">
    <div class="login-form">
        <h1 class="login-form__title">Sign in</h1>

        <div th:if="${param.error != null and param.error[0] == 'invalid'}"
             class="login-form__error">
            Sign-in verification failed. Please try again.
        </div>
        <div th:if="${param.logout != null}" class="login-form__notice">
            You have been signed out.
        </div>

        <div class="login-form__widget">
            <script async
                    src="https://telegram.org/js/telegram-widget.js?22"
                    th:attr="data-telegram-login=${botUsername}"
                    data-size="large"
                    data-auth-url="/dashboard/login/telegram"
                    data-request-access="write"></script>
        </div>
    </div>
</main>
</body>
</html>
