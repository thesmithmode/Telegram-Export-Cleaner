<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{dashboard/layout :: layout(title=#{users.title}, content=~{::users-content})}">
<body>

<!--
  Страница "Пользователи" — только ADMIN (URL-guard в DashboardSecurityConfig).
  Таблица загружается через GET /dashboard/api/stats/users из js/pages/users.js.
-->
<div th:fragment="users-content" class="users">
    <div class="section-header">
        <h1 th:text="#{users.heading}">Пользователи</h1>
        <span class="count-badge" data-count-target="users"></span>
    </div>

    <div th:replace="~{dashboard/fragments/period-filter :: period-filter}"></div>

    <div class="table-wrap">
        <table class="data-table" id="users-table">
            <thead>
            <tr>
                <th data-sort-key="user" data-sort-type="string" th:text="#{users.col.user}">Пользователь</th>
                <th data-sort-key="totalExports" data-sort-type="number" th:text="#{users.col.exports}">Экспортов</th>
                <th data-sort-key="totalMessages" data-sort-type="number" th:text="#{users.col.messages}">Сообщений</th>
                <th data-sort-key="totalBytes" data-sort-type="number" th:text="#{users.col.bytes}">Объём</th>
                <th data-sort-key="lastSeen" data-sort-type="date" th:text="#{users.col.lastSeen}">Последний визит</th>
            </tr>
            </thead>
            <tbody id="users-tbody">
            <tr>
                <td colspan="5" style="text-align:center;color:var(--muted)"
                    th:text="#{overview.loading}">Загрузка…</td>
            </tr>
            </tbody>
        </table>
    </div>

    <script th:src="@{/dashboard/js/pages/users.js}" defer></script>
</div>

</body>
</html>
