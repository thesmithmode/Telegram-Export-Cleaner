<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Login</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 400px;
        }
        h2 { margin-bottom: 12px; font-size: 22px; }
        p { color: var(--tg-theme-hint-color, #888); font-size: 15px; line-height: 1.5; }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--tg-theme-hint-color, #ccc);
            border-top-color: var(--tg-theme-button-color, #0088cc);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container" id="content">
    <div class="spinner"></div>
    <p>Выполняется вход...</p>
</div>

<form id="loginForm" method="POST" action="/dashboard/login/telegram" style="display:none">
    <input type="hidden" id="initDataInput" name="initData">
</form>

<script>
    (function () {
        var tg = window.Telegram && window.Telegram.WebApp;
        if (!tg || !tg.initData) {
            document.getElementById('content').innerHTML =
                '<h2>Telegram Export Cleaner</h2>' +
                '<p>Эта страница открывается только в Telegram.<br>' +
                'Найдите бота и нажмите кнопку <strong>Dashboard</strong>.</p>';
            return;
        }
        tg.ready();
        tg.expand();
        document.getElementById('initDataInput').value = tg.initData;
        document.getElementById('loginForm').submit();
    })();
</script>
</body>
</html>
